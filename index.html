<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#2f7d6b">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>家計簿ライフプラン — キャッシュフロー予測</title>
<style>
:root{
  --bg:#f5f4ef; --card:#ffffff; --ink:#23231f; --sub:#6b6a63; --line:#e2e0d7;
  --accent:#2f7d6b; --accent2:#3a6ea5; --warn:#c0492f; --pos:#2f7d6b; --neg:#c0492f;
  --chip:#eef0ec; --radius:12px;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#1b1b19; --card:#26261f; --ink:#eceadf; --sub:#a3a196; --line:#3a3a32;
    --accent:#4fb39a; --accent2:#6ba0d8; --warn:#e0765c; --pos:#4fb39a; --neg:#e0765c; --chip:#31312a; }
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;line-height:1.6;font-size:15px}
header{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:600;margin:0;flex:1;min-width:180px}
header .tools{display:flex;gap:8px;flex-wrap:wrap}
button,select,input{font-family:inherit;font-size:14px;color:inherit}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 13px;cursor:pointer}
.btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--line)}
.btn.sm{padding:4px 9px;font-size:13px}
.btn.danger{background:transparent;color:var(--neg);border:1px solid var(--line)}
nav{display:flex;gap:4px;overflow-x:auto;padding:8px 12px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:53px;z-index:19}
nav button{white-space:nowrap;background:transparent;border:none;padding:7px 13px;border-radius:8px;cursor:pointer;color:var(--sub)}
nav button.on{background:var(--chip);color:var(--ink);font-weight:600}
main{max-width:1120px;margin:0 auto;padding:16px}
.tab{display:none}
.tab.on{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.card h2{font-size:16px;margin:0 0 4px}
.card .hint{color:var(--sub);font-size:13px;margin:0 0 12px}
label.f{display:block;font-size:13px;color:var(--sub);margin-bottom:3px}
input[type=text],input[type=number],select{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--bg)}
input[type=number]{text-align:right}
.grid{display:grid;gap:10px}
.row{display:grid;gap:8px;align-items:end;margin-bottom:8px}
.tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius)}
table.data{border-collapse:collapse;width:100%;font-size:13px}
table.data th,table.data td{padding:5px 8px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line)}
table.data th:first-child,table.data td:first-child{text-align:left;position:sticky;left:0;background:var(--card);z-index:1}
table.data thead th{background:var(--chip);position:sticky;top:0;z-index:2}
table.data thead th:first-child{z-index:3}
table.data tr.total td{font-weight:600;border-top:2px solid var(--line)}
table.data td.neg{color:var(--neg)}
td.negyear,th.negyear{background:rgba(192,73,47,.14)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.kpi{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px}
.kpi .lab{font-size:12px;color:var(--sub)}
.kpi .val{font-size:22px;font-weight:600;margin-top:2px}
.kpi .val.warn{color:var(--warn)}
.itemrow{display:grid;gap:8px;align-items:end;padding:10px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--bg)}
.itemrow .rm{grid-column:span 1}
.mini{font-size:12px;color:var(--sub)}
.seg{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.seg input{width:90px}
.tag{display:inline-block;background:var(--chip);border-radius:20px;padding:2px 10px;font-size:12px;color:var(--sub);margin-right:6px}
.chartbox{width:100%;overflow-x:auto}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--sub);margin-top:8px}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.addbtn{margin-top:4px}
details.help{margin-top:8px}
details.help summary{cursor:pointer;color:var(--sub);font-size:13px}
.kform input,.kform select{font-size:16px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--chip);border:1px solid var(--line);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:13px;color:var(--sub)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.seg2{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;width:max-content}
.seg2 button{border:none;background:transparent;padding:8px 18px;cursor:pointer;color:var(--sub);font-size:15px}
.seg2 button.on{background:var(--accent);color:#fff}
.entry{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--line);font-size:14px}
.entry .cat{background:var(--chip);border-radius:6px;padding:1px 8px;font-size:12px;color:var(--sub);white-space:nowrap}
.entry .amt{margin-left:auto;font-weight:600;white-space:nowrap}
.entry .amt.in{color:var(--pos)}
.catbar{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:13px}
.catbar .bar{height:9px;border-radius:5px;background:var(--accent2);min-width:2px}
.monthnav{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.monthnav b{font-size:17px;min-width:120px;text-align:center}
.pbar{background:var(--chip);border-radius:6px;height:12px;margin-top:8px;overflow:hidden}
.pbar>div{height:100%;border-radius:6px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-h{text-align:center;font-size:12px;color:var(--sub);padding:3px 0}
.cal-h.sun,.cal-d.sun{color:var(--neg)}
.cal-h.sat,.cal-d.sat{color:var(--accent2)}
.cal-cell{min-height:58px;border:1px solid var(--line);border-radius:6px;padding:3px;font-size:11px;cursor:pointer;background:var(--bg);overflow:hidden}
.cal-cell.empty{border:none;background:transparent;cursor:default}
.cal-cell.today{background:var(--chip)}
.cal-cell.sel{border:2px solid var(--accent);padding:2px}
.cal-d{font-size:12px;color:var(--sub);line-height:1.3}
.cal-e{color:var(--neg);font-weight:600;line-height:1.3;white-space:nowrap}
.cal-i{color:var(--pos);font-weight:600;line-height:1.3;white-space:nowrap}
#gearBtn{margin-left:auto;white-space:nowrap}
.brow{display:grid;grid-template-columns:96px 100px 1fr;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.brow:last-child{border-bottom:none}
.brow .bname{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brow input{padding:6px 7px}
.brow.total{border-top:2px solid var(--line)}
.brow.total .bname{font-weight:600}
@media(max-width:640px){
  header h1{display:none}
  nav{position:fixed;left:0;right:0;bottom:0;top:auto;border-top:1px solid var(--line);border-bottom:none;z-index:30;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom,0px))}
  nav button{flex:1;text-align:center;padding:10px 2px;font-size:13px}
  main{padding-bottom:90px}
  .brow{grid-template-columns:88px 92px 1fr;gap:6px}
}
.tl-row{display:grid;grid-template-columns:64px 1fr;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.tl-year{font-weight:600;text-align:center;color:var(--sub)}
.tl-row.heavy .tl-year{color:var(--neg)}
.tl-ev{display:inline-block;background:var(--chip);border-radius:6px;padding:2px 8px;font-size:12px;margin:2px 4px 2px 0}
@media print{
  header,nav,#gearBtn,.tools,#printBtn,#updBar,#storageWarn,#chatFab,#chatPanel{display:none !important}
  main{padding:0;max-width:none}
  .card{border:1px solid #ccc;break-inside:avoid;box-shadow:none}
  .chip:not(.on){display:none}
  body{background:#fff}
}
@media(max-width:600px){ main{padding:10px} .card{padding:12px} }
/* ライフプラン診断 */
.diag-badge{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.diag-rank{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#fff;flex:none}
.diag-rank.A{background:#2f9e6b}.diag-rank.B{background:#5aa84a}.diag-rank.C{background:#c9a227}.diag-rank.D{background:#d07b2f}.diag-rank.E{background:#c0492f}
.diag-item{border-top:1px solid var(--line);padding:10px 0}
.diag-item .h{display:flex;align-items:center;gap:8px;font-size:14px}
.diag-item .ic{font-size:16px;flex:none}
.diag-item .ic.good{color:var(--pos)}.diag-item .ic.ok{color:var(--accent2)}.diag-item .ic.warn{color:var(--neg)}
.diag-item .k{font-weight:600}
.diag-item .msg{color:var(--sub);font-size:13px;margin:2px 0 0 24px}
.diag-item .adv{font-size:13px;margin:6px 0 0 24px;padding:8px 10px;background:var(--bg);border-radius:8px;border-left:3px solid var(--accent)}
/* かんたん設定ガイド（ウィザード） */
#wizard{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.45);align-items:center;justify-content:center;padding:12px}
.wzbox{background:var(--card);border-radius:16px;width:100%;max-width:520px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.35)}
.wzhead{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);font-weight:600}
.wzhead .x{margin-left:auto;background:transparent;border:none;font-size:22px;cursor:pointer;color:var(--sub);line-height:1;padding:0 4px}
.wzprog{height:4px;background:var(--chip)}
.wzprog>div{height:100%;background:var(--accent);transition:width .3s;width:0}
.askOverlay{position:fixed;inset:0;z-index:120;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:16px}
.askBox{background:var(--card);border-radius:14px;width:100%;max-width:420px;padding:18px;box-shadow:0 12px 40px rgba(0,0,0,.35)}
.askBox .askMsg{font-size:14px;margin-bottom:10px;white-space:pre-wrap}
.askBox .askInput{width:100%;box-sizing:border-box;margin-bottom:14px}
.askBox .askBtns{display:flex;gap:8px;justify-content:flex-end}
.wzlog{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;min-height:180px}
.wzb{max-width:86%;padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.5;white-space:normal}
.wzb.bot{align-self:flex-start;background:var(--chip);border-bottom-left-radius:4px}
.wzb.me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.wzinput{border-top:1px solid var(--line);padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.wzopts{display:flex;flex-wrap:wrap;gap:8px}
.wzopts button{background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:9px 15px;cursor:pointer;color:var(--ink);font-size:14px}
.wzopts button:hover{border-color:var(--accent);color:var(--accent)}
.wznum{display:flex;gap:8px;align-items:center}
.wznum input{flex:1}
.wzrow{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.wzskip{background:transparent;border:none;color:var(--sub);font-size:13px;cursor:pointer;text-decoration:underline;padding:2px}
.wzsum{font-size:13px;max-height:34vh;overflow-y:auto}
.wzsum div{display:flex;justify-content:space-between;gap:10px;padding:4px 0;border-bottom:1px dashed var(--line)}
.wzsum div b{text-align:right}
/* 教育費の各段階の行 */
.edu-row{display:grid;grid-template-columns:70px minmax(120px,1.4fr) minmax(110px,1fr) auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--line)}
.edu-row:last-child{border-bottom:none}
.edu-lab{font-size:13px;color:var(--sub)}
.edu-amt,.edu-yr{display:flex;align-items:center;gap:5px}
.edu-amt input,.edu-yr input{width:70px}
.edu-amt input:disabled{opacity:.4}
@media(max-width:600px){ .edu-row{grid-template-columns:1fr 1fr;gap:6px} .edu-lab{grid-column:1/-1} }
/* 折りたたみカード */
.cardhead{display:flex;align-items:center;gap:8px;cursor:pointer}
.cardhead h2{flex:1;margin:0}
.cardtoggle{font-size:12px;color:var(--sub);white-space:nowrap}
/* 使い方ガイド（チャット） */
.chatFab{position:fixed;right:18px;bottom:18px;z-index:90;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.25)}
@media(max-width:640px){ .chatFab{bottom:76px} }
.chatPanel{position:fixed;right:18px;bottom:80px;z-index:91;width:340px;max-width:92vw;max-height:70vh;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.3);display:flex;flex-direction:column;overflow:hidden}
@media(max-width:640px){ .chatPanel{bottom:138px} }
.chathead{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line);font-weight:600}
.chathead .x{margin-left:auto;background:transparent;border:none;font-size:20px;cursor:pointer;color:var(--sub)}
.chatlog{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;min-height:180px}
.chatin{border-top:1px solid var(--line);padding:10px;display:flex;gap:6px}
.chatin input{flex:1}
</style>
</head>
<body>
<header>
  <h1>家計簿ライフプラン</h1>
  <div class="seg2">
    <button id="modeK">家計簿</button>
    <button id="modeP">ライフプラン</button>
  </div>
  <button class="btn ghost sm" id="gearBtn" title="設定" aria-label="設定">⚙ 設定</button>
</header>
<nav id="nav"></nav>
<main>
  <section class="tab" data-tab="khome" id="tab-khome"></section>
  <section class="tab" data-tab="kinput" id="tab-kinput"></section>
  <section class="tab" data-tab="ksave" id="tab-ksave"></section>
  <section class="tab" data-tab="kmanage" id="tab-kmanage"></section>
  <section class="tab" data-tab="home" id="tab-home"></section>
  <section class="tab" data-tab="plan" id="tab-plan"></section>
  <section class="tab" data-tab="yojitsu" id="tab-yojitsu"></section>
  <section class="tab" data-tab="analysis" id="tab-analysis"></section>
  <section class="tab" data-tab="scenario" id="tab-scenario"></section>
  <section class="tab" data-tab="settings" id="tab-settings"></section>
</main>

<script>
"use strict";
const APP_VERSION = "2026.07.20-21";
const MAN = v => (v==null||isNaN(v))?"0":Math.round(v).toLocaleString("ja-JP");

/* ========================================================================
   ★ 収益化リンクの設定（公開する人が編集する場所）★
   節約タブの各ボタンに表示するリンクです。
   ・url に、A8.net・もしもアフィリエイト等で取得したURLを貼るとボタンが有効になります。
   ・url を "" （空）のままにすると「準備中」と表示され、押せません。
   ・URLを変えたら index.html を保存して、GitHub に再アップロードすれば全ユーザーに反映されます。
   ・広告（PR）である旨は画面に自動で表示されます（景品表示法のステマ規制対応）。
   　例）phone: { label:"格安SIMを比較する", url:"https://px.a8.net/..." }

   ▼ 各枠に「どんな案件を貼るか」の目安（診断結果に応じて自動で出し分けます）
   【スマホ料金診断】診断で選ばれたキャリアの枠だけが表示されます。
   　　アフィリエイト案件が無いキャリアは、公式サイトのURLをそのまま貼ればOKです。
   　sim_rakuten … 楽天モバイル公式／アフィリ
   　sim_ahamo   … ahamo公式（ドコモ）
   　sim_ymobile … ワイモバイル公式／アフィリ
   　sim_uq      … UQ mobile公式／アフィリ
   　sim_linemo  … LINEMO公式／アフィリ
   　sim_mvno    … MVNO（mineo・IIJmio等）またはMVNO比較サイト
   　phone       … 格安SIMの比較サイト（上記に当てはまらない時の汎用枠）
   【その他】
   　furusato … ふるさと納税ポータル（例：さとふる、楽天ふるさと納税、ふるなび）
   　denki    … 電気・都市ガスの料金比較/切替（例：エネチェンジ、価格.com電気、セレクトラ）
   　lpgas    … プロパンガス(LPガス)の料金見直し・相見積もり（例：enepi、ガス屋の窓口）
   　　　　　　 ※プロパンは都市ガスと案件が別で単価も高いため、枠を分けています
   　hoken    … 保険の無料相談（例：保険見直しラボ、ほけんの窓口）※商品名の推奨はしないこと
   　shoken   … NISA・証券口座開設（例：SBI証券、楽天証券、マネックス証券）
   　gakushi  … 学資保険・教育資金の無料相談／資料請求（例：ほけんの窓口、学資保険比較）※商品名の推奨はしないこと
   ======================================================================== */
const SAVE_LINKS={
  sim_rakuten:{label:"楽天モバイルを見る",url:""},
  sim_ahamo:{label:"ahamoを見る",url:""},
  sim_ymobile:{label:"ワイモバイルを見る",url:""},
  sim_uq:{label:"UQ mobileを見る",url:""},
  sim_linemo:{label:"LINEMOを見る",url:""},
  sim_mvno:{label:"MVNO（mineo・IIJmio等）を見る",url:""},
  phone:{label:"格安SIMを比較する",url:""},
  furusato:{label:"ふるさと納税サイトを見る",url:""},
  denki:{label:"電気・都市ガスの料金を比較する",url:""},
  lpgas:{label:"プロパンガスの料金を見直す",url:""},
  hoken:{label:"保険を無料で見直す",url:""},
  shoken:{label:"NISA・証券口座を比較する",url:""},
  gakushi:{label:"学資保険・教育資金を相談する",url:""},
};
// 「次の一歩」カードに並べる汎用枠（キャリア個別の枠は診断結果のみに表示）
const SAVE_LINK_GENERAL=["phone","furusato","denki","lpgas","hoken","shoken"];
// アフィリエイトリンクの共通属性（新規タブ・参照元秘匿・広告関係の明示）
const AFF_REL='noopener noreferrer nofollow sponsored';
// 収益化リンクのボタンHTML（URL未設定なら「準備中」。設定済みなら PR 表示付きの外部リンク）
function affLinkHtml(cfg, style){
  if(!cfg) return "";
  style=style||"";
  if(cfg.url) return `<a class="btn ghost sm" href="${cfg.url}" target="_blank" rel="${AFF_REL}" style="${style}">${cfg.label} ↗ <span class="tag" style="font-size:10px;vertical-align:1px">PR</span></a>`;
  return `<button class="btn ghost sm" disabled style="opacity:.55;${style}">${cfg.label}（準備中）</button>`;
}
// 収益化リンクが1つでも設定されているか
function anyAffLink(){ return Object.values(SAVE_LINKS).some(v=>v&&v.url); }
const uid = () => Math.random().toString(36).slice(2,9);
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
// テキスト入力モーダル（window.promptの代替。PWA/一部環境でpromptが無効でも動く）。Promise<string|null>を返す
function askText(message, def){
  return new Promise(resolve=>{
    const ov=document.createElement("div"); ov.className="askOverlay";
    ov.innerHTML=`<div class="askBox">
      <div class="askMsg">${String(message||"").replace(/</g,"&lt;")}</div>
      <input type="text" class="askInput" value="${String(def==null?"":def).replace(/"/g,"&quot;")}">
      <div class="askBtns"><button class="btn ghost sm askCancel">キャンセル</button><button class="btn sm askOk">OK</button></div>
    </div>`;
    document.body.appendChild(ov);
    const inp=ov.querySelector(".askInput");
    let done=false;
    const finish=v=>{ if(done)return; done=true; ov.remove(); resolve(v); };
    ov.querySelector(".askOk").onclick=()=>finish(inp.value);
    ov.querySelector(".askCancel").onclick=()=>finish(null);
    ov.addEventListener("click",e=>{ if(e.target===ov) finish(null); });
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter") finish(inp.value); else if(e.key==="Escape") finish(null); });
    setTimeout(()=>{ try{ inp.focus(); inp.select(); }catch(e){} },30);
  });
}

/* ---------- 年金の繰上げ・繰下げ（65歳基準／繰上げ-0.4%/月・繰下げ+0.7%/月） ---------- */
function pensionFactor(claimAge){
  const c=clamp(+claimAge||65,60,75);
  return c>=65 ? 1+0.007*12*(c-65) : 1-0.004*12*(65-c);
}

/* ---------- 税・社会保険料（簡易・実効負担率） ---------- */
function taxOn(annual){
  if(annual<=0) return 0;
  let r;
  if(annual<100) r=.08; else if(annual<300) r=.14; else if(annual<500) r=.19;
  else if(annual<700) r=.24; else if(annual<900) r=.27; else if(annual<1200) r=.30; else r=.33;
  return annual*r;
}
function pensionTax(annual){ return annual>0 ? annual*0.10 : 0; }

/* ---------- ふるさと納税の控除上限（目安・給与所得者） ---------- */
// 給与所得控除（円）2020年以降
function salaryDeduction(income){
  if(income<=1625000) return 550000;
  if(income<=1800000) return income*0.4-100000;
  if(income<=3600000) return income*0.3+80000;
  if(income<=6600000) return income*0.2+440000;
  if(income<=8500000) return income*0.1+1100000;
  return 1950000;
}
// 所得税の限界税率
function incomeTaxMarginal(taxable){
  if(taxable<=1950000) return 0.05;
  if(taxable<=3300000) return 0.10;
  if(taxable<=6950000) return 0.20;
  if(taxable<=9000000) return 0.23;
  if(taxable<=18000000) return 0.33;
  if(taxable<=40000000) return 0.40;
  return 0.45;
}
// 給与収入額面(円)＋家族構成から、ふるさと納税の実質2000円負担で済む上限額(円)を概算
// opt:{spouse:bool(配偶者控除対象), dep16:高校生相当(16-18)の人数, dep19:大学生相当(19-22)の人数, socialRate}
function furusatoLimitYen(grossYen, opt){
  opt=opt||{};
  if(grossYen<=0) return 0;
  const kyuyo=salaryDeduction(grossYen);
  const shotoku=grossYen-kyuyo; // 給与所得
  const shakai=grossYen*(opt.socialRate!=null?opt.socialRate:0.15); // 社会保険料控除（概算）
  const dep16=+opt.dep16||0, dep19=+opt.dep19||0, spouse=!!opt.spouse;
  // 所得税の課税所得と限界税率
  const taxableIT=Math.max(0, shotoku-shakai-480000-(spouse?380000:0)-dep16*380000-dep19*630000);
  const itRate=incomeTaxMarginal(taxableIT);
  // 住民税の所得割（標準10%）
  const taxableJU=Math.max(0, shotoku-shakai-430000-(spouse?330000:0)-dep16*330000-dep19*450000);
  const juShotokuwari=taxableJU*0.10;
  const limit=juShotokuwari*0.2/(0.9-itRate*1.021)+2000;
  return Math.max(0, Math.round(limit/1000)*1000); // 1000円単位に丸め
}
// 指定メンバーの、その年の給与額面合計（万円）
function grossSalaryAt(memberId, year){
  const m=member(memberId); if(!m) return 0; const a=ageInYear(m,year);
  return S.incomes.filter(i=>i.type==="salary"&&i.memberId===memberId).reduce((s,i)=>s+salaryAt(i,a),0);
}
// ライフプランの収入・家族構成から、世帯の稼ぎ手ごとのふるさと納税上限を求める
function furusatoFromPlan(){
  const y=S.baseYear;
  const adults=S.members.filter(m=>m.role==="self"||m.role==="spouse");
  const earnersRaw=adults.map(m=>({m,gross:grossSalaryAt(m.id,y)})).filter(e=>e.gross>0);
  // 扶養（子16-22）を集計。扶養控除は所得の高い稼ぎ手にまとめて寄せる
  let dep16=0, dep19=0;
  S.members.filter(m=>m.role==="child").forEach(c=>{ const a=y-c.birthYear; if(a>=16&&a<=18)dep16++; else if(a>=19&&a<=22)dep19++; });
  let hi=null; earnersRaw.forEach(e=>{ if(!hi||e.gross>hi.gross) hi=e; });
  const earners=earnersRaw.map(e=>{
    const otherM=adults.find(a=>a.id!==e.m.id);
    const otherGross=otherM?grossSalaryAt(otherM.id,y):0;
    const spouseControl=!!otherM && otherGross<=103; // 相手の給与が103万以下＝配偶者控除の対象
    const takeDep=(e===hi);
    const d16=takeDep?dep16:0, d19=takeDep?dep19:0;
    const limit=furusatoLimitYen(e.gross*10000,{spouse:spouseControl,dep16:d16,dep19:d19});
    return {name:e.m.name, role:e.m.role, grossMan:e.gross, spouseControl, dep16:d16, dep19:d19, limit};
  });
  const total=earners.reduce((s,e)=>s+e.limit,0);
  return {earners, total, dep16, dep19, hasSpouse:adults.length>1};
}

/* ---------- 給与カーブ補間 ---------- */
function salaryAt(inc, age){
  const p=[...inc.points].sort((a,b)=>a.age-b.age);
  if(age>=inc.endAge || !p.length) return 0;
  if(age<p[0].age) return 0;
  if(age>=p[p.length-1].age) return p[p.length-1].annual;
  for(let i=0;i<p.length-1;i++){
    if(age>=p[i].age && age<p[i+1].age){
      const t=(age-p[i].age)/(p[i+1].age-p[i].age);
      return p[i].annual + t*(p[i+1].annual-p[i].annual);
    }
  }
  return 0;
}

/* ---------- 住宅ローン（月次償還・段階金利・繰上返済対応） ---------- */
function loanSchedule(loan, opt){
  const res={pay:{},interest:{},balEnd:{},payoffYear:null,totalInterest:0,initialMonthly:0};
  if(!loan||!loan.on||loan.principal<=0||loan.termYears<=0) return res;
  const usePrepay=!(opt&&opt.noPrepay);
  const n=loan.termYears*12;
  let bal=loan.principal, pmt=0, curRate=null;
  const rateAt=mi=>{ // mi=0始まりの月index。年目=floor(mi/12)+1
    const yn=Math.floor(mi/12)+1;
    let r=+loan.rate||0;
    if(+loan.rate2>0&&+loan.rate2From>0&&yn>=+loan.rate2From) r=+loan.rate2;
    if(+loan.rate3>0&&+loan.rate3From>0&&yn>=+loan.rate3From) r=+loan.rate3;
    return r;
  };
  const calcPmt=(b,r,rem)=>{ const i=r/100/12; return i===0?b/rem:b*i/(1-Math.pow(1+i,-rem)); };
  for(let mi=0;mi<n&&bal>0.0005;mi++){
    const year=loan.startYear+Math.floor(mi/12);
    // 団信など：この年以降は残債が保険で完済される（支払いなし）
    if(opt&&opt.stopYear&&year>=opt.stopYear){ res.payoffYear=opt.stopYear; bal=0; break; }
    // 年初の繰上返済
    if(usePrepay&&mi%12===0&&Array.isArray(loan.prepays)){
      loan.prepays.forEach(p=>{
        if(+p.year===year&&+p.amount>0&&bal>0.0005){
          const amt=Math.min(+p.amount,bal); bal-=amt;
          res.pay[year]=(res.pay[year]||0)+amt;
          if(p.type==="reduce"&&bal>0.0005) pmt=calcPmt(bal,rateAt(mi),n-mi); // 返済額軽減型
        }
      });
      if(bal<=0.0005){ res.payoffYear=year; res.balEnd[year]=0; break; }
    }
    const r=rateAt(mi);
    if(r!==curRate){ curRate=r; pmt=calcPmt(bal,r,n-mi); if(mi===0) res.initialMonthly=pmt; }
    const i=r/100/12;
    const int_=bal*i;
    const principal=Math.max(0,Math.min(pmt-int_,bal));
    bal-=principal;
    res.pay[year]=(res.pay[year]||0)+int_+principal;
    res.interest[year]=(res.interest[year]||0)+int_;
    res.totalInterest+=int_;
    res.balEnd[year]=bal;
    if(bal<=0.0005){ res.payoffYear=year; res.balEnd[year]=0; break; }
  }
  if(res.payoffYear==null) res.payoffYear=loan.startYear+loan.termYears-1;
  return res;
}
function loanAnnual(loan){ const s=loanSchedule(loan); return (s.initialMonthly||0)*12; }

/* ---------- 教育費：子の年齢→年額 ---------- */
// 大学の修業年数（手入力優先、なければ選択肢の標準年数、既定4年）
function eduUniYears(edu){
  if(edu&&edu.uniYears!=null&&edu.uniYears!=="") return Math.max(0,+edu.uniYears);
  const ch=edu&&edu.choices&&edu.choices["大学"];
  return EDU_UNI_YEARS[ch]!=null?EDU_UNI_YEARS[ch]:4;
}
// あるステージの「学校でかかる費用」年額（手入力があれば優先、なければ 目安総額−塾分）
function eduSchool(edu, label){
  const ov=edu&&edu.amounts&&edu.amounts[label];
  if(ov!=null&&ov!=="") return Math.max(0,+ov);
  const choice=edu&&edu.choices&&edu.choices[label];
  if(!choice||choice==="なし") return 0;
  return Math.max(0,(EDU[choice]||0)-(EDU_JUKU[choice]||0));
}
// あるステージの「塾・習い事」年額（手入力があれば優先、なければプリセットの目安）。大学は対象外
function eduJuku(edu, label){
  if(label==="大学") return 0;
  const ov=edu&&edu.juku&&edu.juku[label];
  if(ov!=null&&ov!=="") return Math.max(0,+ov);
  const choice=edu&&edu.choices&&edu.choices[label];
  if(!choice||choice==="なし") return 0;
  const plan=(edu&&edu.jukuPlan)||"standard";
  return Math.max(0,(JUKU_PRESETS[plan]||JUKU_PRESETS.standard).calc(label,choice));
}
// 後方互換：ステージ年額の合計（学校＋塾・習い事）
function eduAmount(edu, label){ return eduSchool(edu,label)+eduJuku(edu,label); }
function eduAt(edu, childAge){
  for(const st of EDU_STAGES){
    if(st.uni) continue; // 大学は年数可変なので別扱い
    if(childAge>=st.from && childAge<=st.to) return eduSchool(edu,st.label)+eduJuku(edu,st.label);
  }
  // 大学等（18歳開始・年数はuniYearsで可変。塾・習い事は対象外）
  const ch=edu&&edu.choices&&edu.choices["大学"];
  if(ch&&ch!=="なし"){
    const yrs=eduUniYears(edu);
    if(yrs>0 && childAge>=18 && childAge<18+yrs) return eduSchool(edu,"大学");
  }
  return 0;
}

/* ---------- キャッシュフロー計算エンジン（現金と投資を分離） ---------- */
function computeCF(opt){
  ensurePlanModel();
  const prim = S.members.find(m=>m.role==="self") || S.members[0];
  // 世帯のCFは夫婦（本人・配偶者）の寿命まで。子の寿命では延長しない
  const adults = S.members.filter(m=>m.role==="self"||m.role==="spouse");
  // 万一の場合（遺族シミュレーション）：opt.death={memberId,year,insurance,danshin,livingPct}
  const death=(opt&&opt.death&&member(opt.death.memberId))?{
    m:member(opt.death.memberId), year:+opt.death.year||S.baseYear,
    insurance:+opt.death.insurance||0, danshin:opt.death.danshin!==false,
    livingPct:opt.death.livingPct==null?70:+opt.death.livingPct
  }:null;
  // 就業不能シミュレーション：opt.disable={memberId,year,salaried,useIns,extraMonthly}
  const dis=(opt&&opt.disable&&member(opt.disable.memberId))?{
    m:member(opt.disable.memberId), year:+opt.disable.year||S.baseYear,
    salaried:opt.disable.salaried!==false, useIns:opt.disable.useIns!==false,
    extraMonthly:+opt.disable.extraMonthly||0
  }:null;
  // 通常は「加入中」の保険のみ。opt.includeCandidateで「検討中」も含める
  const insList=(S.insurances||[]).filter(p=> p.status!=="candidate" || (opt&&opt.includeCandidate));
  let endYear;
  const survAdults=death?adults.filter(m=>m.id!==death.m.id):adults;
  if(survAdults.length) endYear=Math.max(...survAdults.map(m=>m.birthYear+m.lifespan));
  else if(death){
    const kids=S.members.filter(m=>m.role==="child");
    endYear=kids.length?Math.max(...kids.map(c=>{const ed=S.educations.find(e=>e.childId===c.id); return c.birthYear+(ed?(+ed.independentAge||22):22);})):death.year+1;
    endYear=Math.max(endYear,death.year);
  }
  else endYear=Math.max(...(adults.length?adults:S.members).map(m=>m.birthYear+m.lifespan));
  const loan=S.housing.loan;
  const sched=loanSchedule(loan, death&&death.danshin?{stopYear:death.year}:undefined);
  const infl=(+S.inflation||0)/100;
  const rows=[];
  // 資産の内部状態（現金プール＋投資は銘柄ごと）
  const cashAssets=S.assets.filter(a=>a.type!=="invest");
  const iv=S.assets.filter(a=>a.type==="invest").map(a=>({a,bal:+a.balance||0,depleteYear:null}));
  let cash=cashAssets.reduce((s,a)=>s+(+a.balance||0),0);
  const cashRate=(cashAssets.length?(+cashAssets[0].rate||0):0)/100;
  const startNet=cash+iv.reduce((s,x)=>s+x.bal,0);
  // 節約の反映：opt.saving 優先、なければプランに焼き込まれた S.savingReflect
  const saveOpt=(opt&&opt.saving)||((S.savingReflect&&S.savingReflect.on)?S.savingReflect:null);
  const saveRate=saveOpt?(+saveOpt.rate||0)/100/12:0;
  let svBal=0; // 節約分を投資に回した場合の積立残高

  for(let year=S.baseYear; year<=endYear; year++){
    const primAge=ageInYear(prim,year);
    const ages={}; S.members.forEach(m=>{ ages[m.id]=ageInYear(m,year); });
    const f=Math.pow(1+infl, year-S.baseYear); // インフレ係数

    // ----- 収入 -----
    let salary=0,pension=0,retire=0,other=0, taxableEarned=0, taxablePension=0;
    S.incomes.forEach(inc=>{
      const m=member(inc.memberId); if(!m) return;
      if(death && inc.memberId===death.m.id && year>=death.year) return; // 亡くなった方の収入は途絶える
      if(dis && inc.memberId===dis.m.id && inc.type==="salary" && year>=dis.year) return; // 就業不能で給与が途絶える
      const a=ages[inc.memberId];
      if(a>m.lifespan) return;
      if(inc.type==="salary"){ const v=salaryAt(inc,a); salary+=v; taxableEarned+=v; }
      else if(inc.type==="pension"){
        const ca=+inc.claimAge||inc.startAge||65;
        if(a>=ca){ const v=(+inc.annual||0)*pensionFactor(ca); pension+=v; taxablePension+=v; }
      }
      else if(inc.type==="retire"){ if(a===inc.age) retire+=inc.amount; }
      else if(inc.type==="other"){ if(a>=inc.startAge && a<=inc.endAge) other+=inc.annual; }
    });
    // 遺族年金（非課税）と死亡保険金
    let survivorPen=0;
    if(death && year>=death.year){
      const sv=adults.find(m=>m.id!==death.m.id);
      const kidsN=S.members.filter(m=>m.role==="child" && ages[m.id]>=0 && ages[m.id]<18).length;
      if(kidsN>0) survivorPen+=81.6+23.5*Math.min(kidsN,2)+7.8*Math.max(0,kidsN-2); // 遺族基礎年金＋子の加算
      if(sv && ages[sv.id]<65){ // 遺族厚生年金（老齢厚生相当×3/4・配偶者65歳まで）
        const deadPen=S.incomes.filter(i=>i.type==="pension"&&i.memberId===death.m.id).reduce((s,i)=>s+(+i.annual||0),0);
        survivorPen+=Math.max(0,deadPen-78)*0.75;
      }
      other+=survivorPen;
      if(year===death.year) other+=death.insurance;
    }
    // 就業不能時の公的給付（傷病手当金→障害年金・非課税）と就業不能保険
    let disBen=0;
    if(dis && year>=dis.year){
      const a=ages[dis.m.id];
      const kidsN=S.members.filter(m=>m.role==="child" && ages[m.id]>=0 && ages[m.id]<18).length;
      const kidsAdd=kidsN>0?23.5*Math.min(kidsN,2)+7.8*Math.max(0,kidsN-2):0;
      const penA=S.incomes.filter(i=>i.type==="pension"&&i.memberId===dis.m.id).reduce((s,i)=>s+(+i.annual||0),0);
      const shogai=(a<65)?(81.6+kidsAdd+(dis.salaried?Math.max(0,penA-78):0)):0; // 障害基礎(2級)＋子の加算＋障害厚生(報酬比例相当)
      if(dis.salaried){ // 傷病手当金：給与の2/3を最長1年6ヶ月
        const sal0=S.incomes.filter(i=>i.type==="salary"&&i.memberId===dis.m.id).reduce((s,i)=>s+salaryAt(i,dis.year-dis.m.birthYear),0);
        if(year===dis.year) disBen+=sal0*2/3;
        else if(year===dis.year+1) disBen+=sal0*2/3*0.5;
      }
      if(year===dis.year+1) disBen+=shogai*0.5; // 障害年金は認定(約1年6ヶ月後)から
      else if(year>dis.year+1) disBen+=shogai;
      if(dis.useIns){ // 民間の就業不能保険
        insList.forEach(p=>{
          if(p.type!=="disability"||p.memberId!==dis.m.id) return;
          if(a>(+p.toAge||65)) return;
          const wait=Math.max(0,+p.waitMonths||0);
          disBen+=(+p.monthly||0)*(year===dis.year?Math.max(0,12-wait):12);
        });
      }
      if(dis.extraMonthly>0 && a<65) disBen+=dis.extraMonthly*12; // 必要保障額の逆算用
      other+=disBen;
    }
    // 構造化した保険：保険料と受取（個人年金・学資）
    let insPrem=0;
    insList.forEach(p=>{
      const t=member(p.memberId)||prim; const a=ages[t.id];
      if(a==null||a<0) return;
      const stopped=death && p.memberId===death.m.id && year>=death.year; // 故人の契約は保険料停止
      const limit=p.type==="pension_edu"?(+p.premiumToAge||100):(+p.toAge||100);
      if(!stopped && a<=limit) insPrem+=(+p.premium||0);
      if(p.type==="pension_edu"){
        const pa=+p.payAge||0, py=Math.max(1,+p.payYears||1);
        if(pa&&a>=pa&&a<pa+py) other+=(+p.payout||0);
      }
    });
    const incomeTotal=salary+pension+retire+other;

    // ----- 支出（生活費・教育費・イベントはインフレ反映。ローン・保険料は契約額のまま）-----
    let living=0;
    for(const seg of S.living){ if(primAge>=seg.from&&primAge<=seg.to){ living=seg.monthly*12*f; break; } }
    if(death && year>=death.year) living*=death.livingPct/100; // 遺族の生活費割合
    let housing=0;
    for(const r of S.housing.rent){ if(year>=r.fromYear&&year<=r.toYear) housing+=r.monthly*12; }
    housing+=sched.pay[year]||0;
    S.housing.maintenance.forEach(mt=>{
      if(primAge>=mt.fromAge&&primAge<=mt.toAge&&((primAge-mt.fromAge)%mt.cycle===0)) housing+=mt.annual*f;
    });
    // 住宅ローン控除（年末残高×控除率）
    let deduct=0;
    if(loan&&loan.on&&loan.deductOn&&year>=loan.startYear&&year<loan.startYear+loan.deductYears){
      const balY=sched.balEnd[year]!=null?sched.balEnd[year]:0;
      deduct=Math.min(loan.deductCap, balY*(loan.deductRate/100));
    }
    const cat={"車両費":0,"その他・将来の夢":0,"支払保険料":insPrem,"教育・結婚資金":0};
    S.expenses.forEach(e=>{
      if(death && e.category==="支払保険料" && e.targetId===death.m.id && year>=death.year) return; // 故人の保険料は停止
      const t=member(e.targetId)||prim; const a=ages[t.id];
      if(a>=e.fromAge&&a<=e.toAge&&((a-e.fromAge)%e.cycle===0)){
        const v=e.category==="支払保険料"?e.amount:e.amount*f;
        cat[e.category]=(cat[e.category]||0)+v;
      }
    });
    let edu=0;
    S.educations.forEach(ed=>{ const c=member(ed.childId); if(!c) return; edu+=eduAt(ed, ages[ed.childId])*f; });
    cat["教育・結婚資金"]+=edu;
    // 子どもの一時費用（結婚援助・成人式・免許・留学など）。子がその年齢の年に1回だけ計上
    (S.childEvents||[]).forEach(ev=>{ if(ages[ev.childId]===(+ev.age||0)) cat["教育・結婚資金"]+=(+ev.amount||0)*f; });
    // 電化製品の買い替え（購入年＋耐用年数ごとに同額を計上・インフレ反映）
    let appliance=0;
    (S.appliances||[]).forEach(ap=>{
      const by=+ap.boughtYear||0, ly=Math.max(1,+ap.lifeYears||10);
      if(by>0 && year>by && (year-by)%ly===0) appliance+=(+ap.price||0)*f;
    });
    const tax=taxOn(taxableEarned)+pensionTax(taxablePension);
    // 節約分（生活費削減・インフレ連動）。死亡年以降の遺族生活費削減とは二重に効かせない
    const saveCut=saveOpt?(+saveOpt.annual||0)*f:0;

    const expenseTotal = living+housing+cat["教育・結婚資金"]+cat["車両費"]+cat["その他・将来の夢"]+appliance+tax+cat["支払保険料"]-deduct-saveCut;
    const balance = incomeTotal-expenseTotal;

    // ----- 資産（投資は銘柄ごとに月次で複利・積立・取り崩し）-----
    let contrib=0, withdraw=0;
    iv.forEach(x=>{
      const a=x.a, r=(+a.rate||0)/100/12;
      for(let m=0;m<12;m++){
        x.bal*=(1+r);
        if(+a.monthly>0 && primAge<=(+a.accumEndAge||120)){ x.bal+=+a.monthly; contrib+=+a.monthly; }
        if(+a.drawMonthly>0 && primAge>=(+a.drawStartAge||999) && x.bal>0){
          const w=Math.min(+a.drawMonthly,x.bal); x.bal-=w; withdraw+=w;
          if(x.bal<=0.0005 && x.depleteYear==null) x.depleteYear=year;
        }
      }
    });
    const cashGain=Math.max(cash,0)*cashRate;
    cash=cash+cashGain+balance-contrib+withdraw;
    // 現金が不足したら投資から追加で取り崩す
    if(cash<0){
      for(const x of iv){
        if(cash>=0) break;
        const take=Math.min(-cash,x.bal);
        if(take>0){ x.bal-=take; cash+=take; withdraw+=take; if(x.bal<=0.0005&&x.depleteYear==null) x.depleteYear=year; }
      }
    }
    // 節約分を投資に回す場合：浮いた現金を積立に移し、月次で複利運用（現金がある範囲だけ）
    if(saveOpt&&saveOpt.invest&&saveCut>0){
      const move=Math.max(0,Math.min(saveCut,cash));
      for(let m=0;m<12;m++){ svBal*=(1+saveRate); svBal+=move/12; }
      cash-=move; // 現金から投資へ振替（生活費削減で浮いた分）
    }
    const invest=iv.reduce((s,x)=>s+x.bal,0)+svBal;
    const netWorth=cash+invest;

    rows.push({
      year, primAge, ages,
      salary,pension,retire,other,incomeTotal,
      living, housing, education:cat["教育・結婚資金"], car:cat["車両費"],
      other_exp:cat["その他・将来の夢"], appliance, tax, insurance:cat["支払保険料"], deduct, survivorPen, disBen,
      saving:saveCut, svBal,
      expenseTotal, balance, contrib, withdraw, cash, invest, netWorth
    });
  }
  const assetInfo=iv.map(x=>({id:x.a.id,name:x.a.name,depleteYear:x.depleteYear,finalBal:x.bal}));
  return {rows, startNet, prim, assetInfo, sched};
}

/* もしもの備え：本人・配偶者 */
function emgAdults(){ return S.members.filter(m=>m.role==="self"||m.role==="spouse"); }
function scenLabel(scen){ return {death:"万一（死亡）",disable:"働けなくなった場合"}[scen]||""; }
/* 想定シナリオ→computeCFのオプションを組み立てる（includeCandidateで検討中の保険も反映） */
function emgOptFor(scen, includeCandidate){
  const em=S.emergency; const adults=emgAdults();
  const cand=includeCandidate?{includeCandidate:true}:{};
  if(scen==="death"&&em){
    const t=member(em.target)||adults[0]; if(!t) return includeCandidate?cand:undefined;
    const year=Math.max(S.baseYear,+em.year||(S.baseYear+1));
    const ins=lifeInsFor(t.id,year,includeCandidate)+(+(em.ins[t.id]||0));
    return Object.assign({death:{memberId:t.id,year,insurance:ins,danshin:em.danshin,livingPct:em.livingPct}},cand);
  }
  if(scen==="disable"&&em&&em.dis){
    const t=member(em.dis.target)||adults[0]; if(!t) return includeCandidate?cand:undefined;
    const year=Math.max(S.baseYear,+em.dis.year||(S.baseYear+1));
    return Object.assign({disable:{memberId:t.id,year,salaried:em.dis.salaried,useIns:true}},cand);
  }
  return includeCandidate?cand:undefined;
}

function switchInputMode(to){
  if(to===S.inputMode) return;

/* 現在の（詳細）Sから、かんたん入力の値を逆算する */
function simpleFromState(){
  const a=(S.simple&&typeof S.simple==="object")?JSON.parse(JSON.stringify(S.simple)):{};
  const by=S.baseYear;
  const self=S.members.find(m=>m.role==="self")||S.members[0];
  const spouse=S.members.find(m=>m.role==="spouse");
  const kids=S.members.filter(m=>m.role==="child");
  if(self) a.selfBirth=self.birthYear;
  a.hasSpouse=spouse?"yes":"no";
  a.kids=kids.length;
  a.kidYears=kids.map(c=>c.birthYear);
  const salOf=m=>m?Math.round(S.incomes.filter(i=>i.type==="salary"&&i.memberId===m.id).reduce((s,i)=>s+salaryAt(i,by-m.birthYear),0)):0;
  a.selfIncome=salOf(self);
  if(spouse) a.spouseIncome=salOf(spouse);
  const penOf=m=>m?Math.round(S.incomes.filter(i=>i.type==="pension"&&i.memberId===m.id).reduce((s,i)=>s+(+i.annual||0),0)):0;
  a.pensionKnown="yes"; a.selfPension=penOf(self); if(spouse) a.spousePension=penOf(spouse);
  const loan=S.housing.loan;
  if(loan&&loan.on){ a.housing="own_loan"; a.loanBal=Math.round(loan.principal); a.loanRate=loan.rate; a.loanYears=loan.termYears; }
  else if(S.housing.rent&&S.housing.rent.length){ a.housing="rent"; a.rent=S.housing.rent[0].monthly; }
  else a.housing="own_free";
  const livSeg=S.living.find(s=>s.to<65)||S.living[0]; if(livSeg) a.living=livSeg.monthly;
  const prem=(S.insurances||[]).reduce((s,p)=>s+(+p.premium||0),0)+S.expenses.filter(e=>e.category==="支払保険料").reduce((s,e)=>s+(+e.amount||0),0);
  a.insurance=Math.round(prem);
  a.deathAmount=Math.round((S.insurances||[]).filter(p=>p.type==="life").reduce((s,p)=>s+(+p.amount||0),0));
  a.savings=Math.round(S.assets.filter(x=>x.type!=="invest").reduce((s,x)=>s+(+x.balance||0),0));
  const iv=S.assets.find(x=>x.type==="invest"); a.invest=iv?Math.round(iv.balance):0; a.monthlyInvest=iv?iv.monthly:0;
  if(!a.eduPlan) a.eduPlan="std";
  return a;
}

let wz=null;

    <div class="wzhead"><span>🪄 かんたん設定ガイド</span><button class="x" id="wzClose" aria-label="閉じる">×</button></div>

function wzCloseConfirm(){ if(wz&&wz.done){ wzClose(); return; } if(confirm("設定ガイドを閉じますか？（途中までの入力は反映されません）")) wzClose(); }
function wzClose(){ const d=document.getElementById("wizard"); if(d) d.style.display="none"; wz=null; }
function wzPrefill(){
  const a={};

    const self=S.members.find(m=>m.role==="self"); if(self) a.selfBirth=self.birthYear;
    if(S.living&&S.living[0]) a.living=S.living[0].monthly;
    const cash=S.assets.filter(x=>x.type!=="invest").reduce((s,x)=>s+(+x.balance||0),0); if(cash) a.savings=Math.round(cash);
    const iv=S.assets.find(x=>x.type==="invest"); if(iv){ a.invest=Math.round(iv.balance); a.monthlyInvest=iv.monthly; }
  }catch(e){}
  return a;
}
function wzOpen(){
  wzEnsureDom();

  document.getElementById("wizard").style.display="flex";
  document.getElementById("wzLog").innerHTML="";
  wzBubble("bot","こんにちは！いくつかの質問に答えるだけで、ライフプランの前提を作成します。3〜5分ほどで終わります。数字は「わからない・標準でOK」で目安の値を使ってスキップできます。");
  wz.i=wzSkipFwd(0);

}
function wzSkipFwd(i){ while(i<WZ_STEPS.length && WZ_STEPS[i].skip && WZ_STEPS[i].skip(wz.a)) i++; return i; }
function wzSkipBack(i){ while(i>=0 && WZ_STEPS[i].skip && WZ_STEPS[i].skip(wz.a)) i--; return i; }
function wzBubble(who,text){ const log=document.getElementById("wzLog"); const b=document.createElement("div"); b.className="wzb "+who; b.innerHTML=text; log.appendChild(b); log.scrollTop=log.scrollHeight; }
function wzAsk(){
  const inp=document.getElementById("wzInput");

  if(wz.i>=WZ_STEPS.length){ wzSummary(); return; }

  wzBubble("bot", st.q + (st.hint?`<br><span style="color:var(--sub);font-size:12px">${st.hint}</span>`:""));
  inp.innerHTML="";
  if(st.type==="choice"){
    const wrap=document.createElement("div"); wrap.className="wzopts";
    st.options.forEach(o=>{ const b=document.createElement("button"); b.textContent=o.l; b.onclick=()=>wzAnswer(o.v,o.l); wrap.appendChild(b); });
    inp.appendChild(wrap);
    if(wz.i>0){ const back=document.createElement("button"); back.className="wzskip"; back.textContent="← 戻る"; back.onclick=wzBack; back.style.marginTop="6px"; inp.appendChild(back); }
  } else if(st.type==="number"){

      <div class="wzrow"><button class="wzskip" id="wzSkip">わからない・標準でOK（${st.def}${st.unit||""}）</button>${wz.i>0?`<button class="wzskip" id="wzBack">← 戻る</button>`:""}</div>`;
    const go=()=>{ const raw=document.getElementById("wzNum").value; const v=raw===""?st.def:+raw; const val=isNaN(v)?st.def:clamp(v,st.min,st.max); wzAnswer(val, val+(st.unit||"")); };
    document.getElementById("wzNext").onclick=go;

    document.getElementById("wzSkip").onclick=()=>wzAnswer(st.def, st.def+(st.unit||"")+"（標準）");
    const bk=document.getElementById("wzBack"); if(bk) bk.onclick=wzBack;
    setTimeout(()=>{ const n=document.getElementById("wzNum"); if(n){ n.focus(); n.select(); } },30);
  } else if(st.type==="years"){
    const n=wz.a.kids||0, cur=wz.a.kidYears||[];
    let html=`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(88px,1fr))">`;
    for(let k=0;k<n;k++){ const dv=cur[k]!=null?cur[k]:(S.baseYear-3*k); html+=`<div><label class="f">第${k+1}子</label><input type="number" class="wzKY" value="${dv}" min="1990" max="${S.baseYear+12}"></div>`; }
    html+=`</div><div class="wzrow" style="margin-top:8px"><button class="wzskip" id="wzBack">← 戻る</button><button class="btn sm" id="wzNext">次へ</button></div>`;
    inp.innerHTML=html;
    document.getElementById("wzNext").onclick=()=>{ const ys=[...document.querySelectorAll(".wzKY")].map(x=>clamp(+x.value||S.baseYear,1990,S.baseYear+12)); wzAnswer(ys, ys.map(y=>y+"年生まれ").join("・")); };
    document.getElementById("wzBack").onclick=wzBack;
  }
}
function wzAnswer(v,disp){ const st=WZ_STEPS[wz.i]; wz.a[st.id]=v; wzBubble("me",disp); wz.i=wzSkipFwd(wz.i+1); wzAsk(); }
function wzBack(){ let i=wzSkipBack(wz.i-1); if(i<0) return; wz.i=i; wzBubble("bot","↩ ひとつ前の質問に戻ります。"); wzAsk(); }
function wzSummary(){

  R.push(["住まい",{rent:"賃貸",own_loan:"持ち家（ローンあり）",own_free:"持ち家（ローンなし）"}[a.housing]||"—"]);
  if(a.housing==="rent") R.push(["家賃",(a.rent||0)+"万円/月"]);

  if(a.kids) R.push(["進路方針",{public:"できるだけ公立",uni_private:"大学は私立想定",private:"中学から私立も",std:"標準"}[a.eduPlan]||"標準"]);
  R.push(["生活費",(a.living||0)+"万円/月"]);
  R.push(["保険料",(a.insurance||0)+"万円/年"+((+a.deathAmount||0)>0?`（死亡保障 ${a.deathAmount}万円）`:"")]);

  R.push(["年金",a.pensionKnown==="yes"?`本人${a.selfPension}万円/年${a.hasSpouse==="yes"?"・配偶者"+a.spousePension+"万円/年":""}`:"年収から概算"]);
  R.push(["家電の買い替え","標準セットを自動設定（購入年はあとで調整）"]);
  wzBubble("bot","ありがとうございます！入力内容はこちらです。この内容でライフプランを作成しますか？（作成後もすべて手直しできます）");
  const inp=document.getElementById("wzInput");
  inp.innerHTML=`<div class="wzsum">${R.map(r=>`<div><span>${r[0]}</span><b>${r[1]}</b></div>`).join("")}</div>
    <div class="wzrow" style="margin-top:10px"><button class="wzskip" id="wzRestart">↩ 最初からやり直す</button><button class="btn" id="wzApply">この内容で作成する</button></div>`;
  document.getElementById("wzApply").onclick=()=>{ wzApply(wz.a); wzClose(); MODE="lifeplan"; settingsOpen=false; pCur="home"; render(); window.scrollTo(0,0); alert("ライフプランを作成しました。サマリー上部に診断を表示しています。前提は各タブでいつでも調整できます。"); };
  document.getElementById("wzRestart").onclick=wzOpen;
}
function wzSalaryCurve(nowAge,inc){ const a0=clamp(nowAge,22,64); if(a0>=54||inc<=0) return [{age:a0,annual:inc}]; return [{age:a0,annual:inc},{age:55,annual:Math.round(inc*1.15)}]; }
function wzEstPension(inc){ return inc<=0?78:Math.round(78+inc*0.0055*40); }
function wzOwnMaint(nowAge){ return [
  {name:"固定資産税",annual:12,fromAge:Math.max(0,nowAge),toAge:100,cycle:1},
  {name:"火災保険料",annual:20,fromAge:Math.max(0,nowAge),toAge:100,cycle:5},
  {name:"住宅メンテ",annual:100,fromAge:Math.max(0,nowAge)+12,toAge:100,cycle:15}
]; }
function wzApply(a){
  const baseYear=S.baseYear||new Date().getFullYear();
  const selfBirth=+a.selfBirth||1990;
  const nowAge=clamp(baseYear-selfBirth,0,80);
  const members=[{id:"self",name:"ご本人",role:"self",birthYear:selfBirth,lifespan:90}];
  if(a.hasSpouse==="yes") members.push({id:"spouse",name:"配偶者",role:"spouse",birthYear:selfBirth,lifespan:95});
  const kidYears=a.kids?(a.kidYears||[]):[];
  kidYears.forEach((y,i)=>members.push({id:"c"+(i+1),name:"第"+(i+1)+"子",role:"child",birthYear:+y||baseYear,lifespan:90}));
  const incomes=[];
  incomes.push({id:uid(),memberId:"self",type:"salary",endAge:65,points:wzSalaryCurve(nowAge,+a.selfIncome||0)});
  if(a.hasSpouse==="yes"&&(+a.spouseIncome||0)>0) incomes.push({id:uid(),memberId:"spouse",type:"salary",endAge:65,points:wzSalaryCurve(nowAge,+a.spouseIncome||0)});
  const selfPen=a.pensionKnown==="yes"?(+a.selfPension||0):wzEstPension(+a.selfIncome||0);
  incomes.push({id:uid(),memberId:"self",type:"pension",startAge:65,claimAge:65,annual:selfPen});
  if(a.hasSpouse==="yes"){ const sp=a.pensionKnown==="yes"?(+a.spousePension||0):wzEstPension(+a.spouseIncome||0); incomes.push({id:uid(),memberId:"spouse",type:"pension",startAge:65,claimAge:65,annual:sp}); }
  const liv=+a.living||20;
  const living=[{from:0,to:64,monthly:liv},{from:65,to:120,monthly:Math.round(liv*0.85*10)/10}];
  let rent=[], maintenance=[];
  const loan={on:false,principal:0,rate:1.0,termYears:35,startYear:baseYear,deductOn:false,deductYears:13,deductRate:0.7,deductCap:35,rate2:0,rate2From:0,rate3:0,rate3From:0,prepays:[]};
  if(a.housing==="rent") rent=[{fromYear:baseYear,toYear:baseYear+100,monthly:+a.rent||8}];
  else if(a.housing==="own_loan"){ loan.on=true; loan.principal=+a.loanBal||0; loan.rate=+a.loanRate||1.0; loan.termYears=Math.max(1,+a.loanYears||25); loan.startYear=baseYear; maintenance=wzOwnMaint(nowAge); }
  else if(a.housing==="own_free") maintenance=wzOwnMaint(nowAge);
  const expenses=[];
  const insurances=[];
  const prem=+a.insurance||0, deathAmt=+a.deathAmount||0;
  if(prem>0||deathAmt>0) insurances.push({id:uid(),type:"life",memberId:"self",name:"死亡保険",amount:deathAmt,toAge:64,premium:prem});
  const educations=[];
  if(a.kids){ const preset=EDU_PRESETS[a.eduPlan]||EDU_PRESETS.std; members.filter(m=>m.role==="child").forEach(c=>educations.push({id:uid(),childId:c.id,independentAge:22,choices:Object.assign({},preset)})); }
  const assets=[{id:uid(),name:"預貯金",type:"cash",balance:+a.savings||0,rate:0.1}];
  const inv=+a.invest||0, mo=+a.monthlyInvest||0;
  if(inv>0||mo>0) assets.push({id:uid(),name:"投資（NISA等）",type:"invest",balance:inv,rate:3.0,monthly:mo,accumEndAge:64,drawStartAge:65,drawMonthly:0});
  const appliances=applStdSet(baseYear, a.housing!=="rent");
  const keepKakeibo=S.kakeibo, keepScen=S.scenarios;
  S={ baseYear, inflation:(+S.inflation||0), inputMode:"simple", simple:JSON.parse(JSON.stringify(a)),
      members, incomes, living, housing:{rent,loan,maintenance}, expenses, insurances, educations, assets, appliances };
  if(keepKakeibo) S.kakeibo=keepKakeibo;
  if(Array.isArray(keepScen)) S.scenarios=keepScen;
  ensureKakeibo(); ensurePlanModel(); commit();
}

/* ================= ライフプラン診断（ルールベース） ================= */
function simLivingCut(delta){ const bak=S.living; S.living=bak.map(s=>({from:s.from,to:s.to,monthly:Math.max(0,s.monthly-delta)})); let r; try{ r=computeCF(); } finally{ S.living=bak; } return r; }
function minLivingCut(){ for(let d=1;d<=30;d++){ if(!simLivingCut(d).rows.find(x=>x.netWorth<0)) return d; } return null; }
function simInflation(pct){ const bak=S.inflation; S.inflation=pct; let r; try{ r=computeCF(); } finally{ S.inflation=bak; } return r; }
function diagnosisCard(rows){
  const end=rows[rows.length-1];
  const firstNeg=rows.find(r=>r.netWorth<0);
  const cashNow=S.assets.filter(a=>a.type!=="invest").reduce((s,a)=>s+(+a.balance||0),0);
  const monthlyLiving=rows[0].living/12;
  const net0=Math.max(1,rows[0].incomeTotal-rows[0].tax);
  const D=[];
  if(!firstNeg) D.push({k:"生涯の資金",lv:"good",msg:`試算では ${end.primAge}歳（${end.year}年）まで資産がプラスを保てます。`});
  else{ const cut=minLivingCut(); D.push({k:"生涯の資金",lv:"warn",msg:`${firstNeg.primAge}歳（${firstNeg.year}年）に資産が尽きる試算です。`,adv:cut!=null?`生活費を月 ${cut}万円 抑えると、枯渇を回避できる試算になります。`:`生活費の見直しだけでは補いきれません。収入を増やす・年金を繰り下げる・大きな支出を減らす、を組み合わせて検討しましょう。`}); }
  const months=monthlyLiving>0?cashNow/monthlyLiving:99;
  D.push({k:"緊急予備資金",lv:months>=6?"good":months>=3?"ok":"warn",msg:`預貯金は生活費の約 ${months.toFixed(1)}ヶ月分です（目安6ヶ月）。`,adv:months<6?`失業や病気に備え、生活費6ヶ月分（約 ${Math.round(monthlyLiving*6)}万円）を預貯金で確保すると安心です。`:""});
  const srate=rows[0].balance/net0*100;
  D.push({k:"貯蓄率",lv:srate>=20?"good":srate>=10?"ok":"warn",msg:srate>=0?`今年の手取りに対する貯蓄の割合は約 ${srate.toFixed(0)}%（目安20%）。`:`今年は支出が収入を上回る試算です（貯蓄率マイナス）。`,adv:srate<20?`手取りの2割（年 約${Math.round(net0*0.2)}万円）の貯蓄を目標にすると、資産形成が安定します。`:""});
  const hp=monthlyPlan(S.baseYear); const hAnnual=hp?hp.recur.housing*12:0;
  if(hAnnual>0){ const hr=hAnnual/net0*100; D.push({k:"住居費の負担",lv:hr<=20?"good":hr<=25?"ok":"warn",msg:`住居費（ローン・家賃）は手取りの約 ${hr.toFixed(0)}%（目安25%以内）。`,adv:hr>25?`負担がやや重めです。繰上返済・借り換えや、ほかの固定費の見直しで余裕を作りましょう。`:""}); }
  const eduRows=rows.filter(r=>r.education>0);
  if(eduRows.length){ const pe=eduRows.reduce((x,r)=>r.education>x.education?r:x); const bad=pe.cash<0||pe.netWorth<0; D.push({k:"教育費のピーク",lv:bad?"warn":"good",msg:`ピークは ${pe.year}年（本人${pe.primAge}歳・年 ${MAN(pe.education)}万円）。`,adv:bad?`この時期に資金が不足しがちです。学資保険や早めの積立で、支出の山をならしておきましょう。`:`ピーク時も資金は確保できる見込みです。`}); }
  const r65=rows.find(r=>r.primAge>=65)||end;
  D.push({k:"老後の資金",lv:firstNeg?(firstNeg.primAge<85?"warn":"ok"):"good",msg:`65歳時点の資産は約 ${MAN(r65.netWorth)}万円。`+(firstNeg?`その後 ${firstNeg.primAge}歳で資金が尽きる試算です。`:`生涯を通じて枯渇しません。`),adv:(firstNeg&&firstNeg.primAge<90)?`年金の繰下げ受給（最大75歳で+84%）や就労期間の延長で、受給額と資産の寿命を伸ばせます（「収入」タブで試せます）。`:""});
  const infPct=Math.max(1,(+S.inflation||0)+1);
  const infR=simInflation(infPct); const infEnd=infR.rows[infR.rows.length-1]; const infNeg=infR.rows.find(r=>r.netWorth<0);
  const drop=end.netWorth-infEnd.netWorth;
  const infLv=(infNeg&&!firstNeg)?"warn":(end.netWorth>0&&drop>end.netWorth*0.3)?"ok":"good";
  D.push({k:"インフレ耐性",lv:infLv,msg:`物価が今より高め（+${infPct}%/年）に進むと、最終資産は約 ${MAN(infEnd.netWorth)}万円（${drop>=0?"−":"+"}${MAN(Math.abs(drop))}万円）。`,adv:infLv!=="good"?`物価上昇に強い資産（株式インデックス等）での運用や、支出の点検で備えましょう（「資産」タブで物価上昇率を試せます）。`:""});
  const pts=D.reduce((s,d)=>s+(d.lv==="good"?2:d.lv==="ok"?1:0),0), max=D.length*2, pct=max?pts/max:0;
  let rank=pct>=0.85?"A":pct>=0.7?"B":pct>=0.5?"C":pct>=0.3?"D":"E";
  if(firstNeg&&(rank==="A"||rank==="B")) rank="C";
  const comment={A:"とても健全なプランです。この調子で。",B:"おおむね良好です。いくつか整えるとより安心です。",C:"注意点がいくつかあります。下の改善ポイントを確認しましょう。",D:"見直しをおすすめします。改善ポイントから着手しましょう。",E:"早めの見直しが必要です。まずは支出と住居費から。"}[rank];
  const ic=lv=>lv==="good"?"◎":lv==="ok"?"○":"⚠";
  const items=D.map(d=>`<div class="diag-item"><div class="h"><span class="ic ${d.lv}">${ic(d.lv)}</span><span class="k">${d.k}</span></div><div class="msg">${d.msg}</div>${d.adv?`<div class="adv">💡 ${d.adv}</div>`:""}</div>`).join("");
  const open=isOpen("diag",false);
  return `<div class="card">
    <div class="diag-badge">
      <div class="diag-rank ${rank}">${rank}</div>
      <div style="flex:1"><h2 style="margin:0">ライフプラン診断</h2><p class="hint" style="margin:2px 0 0">${comment}</p></div>
      <button class="btn ghost sm" id="diagToggle">${open?"閉じる ▲":"詳しく見る ▼"}</button>
    </div>
    <div id="diagItems" style="${open?"":"display:none"}">
      ${items}
      <p class="mini" style="margin-top:10px">この診断はアプリ内の計算だけで自動判定した目安です（助言を保証するものではありません）。前提を変えると自動で再判定されます。</p>
    </div>
  </div>`;
}

      <div><label class="f">試算の基準年</label><input type="number" id="baseYear" value="${S.baseYear}"></div>
    </div>
    <p class="mini" style="margin-top:6px">運用利回りは「資産」タブで資産ごとに、物価上昇率も「資産」タブで設定します。</p></div>
    <div class="card"><h2>家族構成</h2>

function renderIncome(){
  const el=document.getElementById("planBody");
  // 手取りの目安（現在・額面→税社保控除後）
  const y=S.baseYear;
  const salMembers=[...new Set(S.incomes.filter(i=>i.type==="salary").map(i=>i.memberId))];
  const netRows=salMembers.map(mid=>{ const g=grossSalaryAt(mid,y); return {name:(member(mid)||{}).name||"", g, t:taxOn(g)}; }).filter(r=>r.g>0);
  const netBox=netRows.length?`
    <div style="background:var(--pos-bg,rgba(79,179,154,.10));border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px">
      <div style="font-size:13px;color:var(--sub);margin-bottom:4px">💡 入力は「額面（税込）」です。税金・社会保険料はCFで自動的に差し引かれます。</div>
      ${netRows.map(r=>`<div style="font-size:14px">${r.name}：額面 <b>${MAN(r.g)}万</b> → 手取り 約 <b style="color:var(--pos)">${MAN(r.g-r.t)}万</b> <span class="mini">（税・社保 約${MAN(r.t)}万を自動控除）</span></div>`).join("")}
      <div class="mini" style="margin-top:4px;color:var(--sub)">※ 年収帯ごとの実効負担率による概算です。キャッシュフロー表・グラフはこの手取りベースで計算されています。</div>
    </div>`:"";
  el.innerHTML=`<div class="card"><h2>収入</h2>
    <p class="hint">給与は「年齢と<b>額面</b>年収（税・社保引き前）の折れ線」で入力します（間の年は自動で補間）。年金・退職金・その他収入も追加できます。</p>
    ${netBox}
    <div id="incList"></div>
    <div style="margin-top:6px">
      <button class="btn ghost sm" data-add="salary">+ 給与</button>
      <button class="btn ghost sm" data-add="pension">+ 年金</button>
      <button class="btn ghost sm" data-add="retire">+ 退職金</button>
      <button class="btn ghost sm" data-add="other">+ その他収入</button>
    </div></div>`;
  const il=document.getElementById("incList");
  S.incomes.forEach(inc=>il.appendChild(incomeCard(inc)));
  el.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>{
    const t=b.dataset.add, mid=S.members[0].id;
    if(t==="salary") S.incomes.push({id:uid(),memberId:mid,type:"salary",endAge:65,points:[{age:25,annual:400},{age:60,annual:600}]});
    if(t==="pension") S.incomes.push({id:uid(),memberId:mid,type:"pension",startAge:65,annual:150});
    if(t==="retire") S.incomes.push({id:uid(),memberId:mid,type:"retire",age:65,amount:1000});
    if(t==="other") S.incomes.push({id:uid(),memberId:mid,type:"other",annual:50,startAge:30,endAge:40});
    commit();
  });
}
function memberSelect(sel){
  return `<select data-k="memberId">${S.members.map(m=>`<option value="${m.id}"${sel===m.id?" selected":""}>${m.name}</option>`).join("")}</select>`;
}
function incomeCard(inc){
  const d=document.createElement("div"); d.className="itemrow"; d.style.display="block";
  const TL={salary:"給与",pension:"年金",retire:"退職金",other:"その他収入"};
  let body="";
  if(inc.type==="salary"){
    body=`<div class="mini" style="margin:6px 0 4px">年齢と額面年収(万円・税込)の折れ線 ＋ 就業終了年齢</div><div id="pts_${inc.id}"></div>
      <button class="btn ghost sm" data-pt>+ 点を追加</button>
      <div style="margin-top:8px;max-width:160px"><label class="f">就業終了年齢</label><input type="number" data-k="endAge" value="${inc.endAge}"></div>`;
  } else if(inc.type==="pension"){
    const ca=+inc.claimAge||65, pf=pensionFactor(ca), adj=(+inc.annual||0)*pf;
    body=`<div class="seg"><div><label class="f">65歳基準の年額(万円)</label><input type="number" data-k="annual" value="${inc.annual}"></div>
      <div><label class="f">受給開始年齢(60〜75)</label><input type="number" data-k="claimAge" value="${ca}" min="60" max="75"></div></div>
      <p class="mini">ねんきん定期便の見込額（65歳時点・年額）を入力。繰上げは月-0.4%・繰下げは月+0.7%で自動調整 →
      <b>この設定では年${MAN(adj)}万円（${Math.round(pf*100)}%）</b>${ca!==65?`／${ca<65?"繰上げ":"繰下げ"}${Math.abs(ca-65)}年`:""}</p>`;
  } else if(inc.type==="retire"){
    body=`<div class="seg"><div><label class="f">受取年齢</label><input type="number" data-k="age" value="${inc.age}"></div>
      <div><label class="f">金額(万円)</label><input type="number" data-k="amount" value="${inc.amount}"></div></div>`;
  } else {
    body=`<div class="seg"><div><label class="f">年額(万円)</label><input type="number" data-k="annual" value="${inc.annual}"></div>
      <div><label class="f">開始年齢</label><input type="number" data-k="startAge" value="${inc.startAge}"></div>
      <div><label class="f">終了年齢</label><input type="number" data-k="endAge" value="${inc.endAge}"></div></div>`;
  }
  d.innerHTML=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:6px">
      <span class="tag">${TL[inc.type]}</span>
      <div style="flex:1;max-width:200px">${memberSelect(inc.memberId)}</div>
      <button class="btn danger sm">×</button></div>${body}`;
  d.querySelector("[data-k=memberId]").onchange=e=>{inc.memberId=e.target.value;commit();};
  d.querySelectorAll("[data-k]:not([data-k=memberId])").forEach(inp=>inp.onchange=e=>{inc[inp.dataset.k]=+e.target.value;commit();});
  d.querySelector(".danger").onclick=()=>{S.incomes=S.incomes.filter(x=>x!==inc);commit();};
  if(inc.type==="salary"){
    const pc=d.querySelector(`#pts_${inc.id}`);
    inc.points.forEach(pt=>{
      const r=document.createElement("div"); r.className="seg";
      r.innerHTML=`<span class="mini">年齢</span><input type="number" value="${pt.age}" data-p="age"><span class="mini">→ 額面</span><input type="number" value="${pt.annual}" data-p="annual"><button class="btn danger sm">×</button>`;
      r.querySelectorAll("[data-p]").forEach(inp=>inp.onchange=e=>{pt[inp.dataset.p]=+e.target.value;commit();});
      r.querySelector(".danger").onclick=()=>{inc.points=inc.points.filter(x=>x!==pt);commit();};
      pc.appendChild(r);
    });
    d.querySelector("[data-pt]").onclick=()=>{inc.points.push({age:40,annual:500});commit();};
  }
  return d;
}

function applNextYear(ap){
  const by=+ap.boughtYear||0, ly=Math.max(1,+ap.lifeYears||10);
  if(!by) return null;
  let y=by+ly; while(y<S.baseYear) y+=ly; return y;
}
function childList(){ return S.members.filter(m=>m.role==="child"); }

  const sum=document.getElementById("applSum");

  document.getElementById("addApplFree").onclick=()=>{
    S.appliances.push({id:uid(),name:"新しい家電",lifeYears:10,price:5,boughtYear:S.baseYear}); commit();
  };
  document.getElementById("applBulk").onclick=()=>{
    const have=new Set((S.appliances||[]).map(a=>a.name));

function insPremiumNow(includeCandidate){
  return (S.insurances||[]).reduce((s,p)=>{
    if(p.status==="candidate"&&!includeCandidate) return s;
    const t=member(p.memberId); if(!t) return s;
    const a=S.baseYear-t.birthYear;
    const limit=p.type==="pension_edu"?(+p.premiumToAge||100):(+p.toAge||100);
    return s+(a>=0&&a<=limit?(+p.premium||0):0);
  },0);

function eduCard(edu){
  if(!edu.amounts||typeof edu.amounts!=="object") edu.amounts={};
  if(!edu.juku||typeof edu.juku!=="object") edu.juku={};
  if(!edu.jukuPlan) edu.jukuPlan="standard";
  const c=member(edu.childId);
  // 総額と、うち塾・習い事の合計（0〜独立まで一度シミュレート）
  let total=0, jukuTotal=0;
  for(let a=0;a<=25;a++){ total+=eduAt(edu,a); for(const st of EDU_STAGES){ if(!st.uni&&a>=st.from&&a<=st.to) jukuTotal+=eduJuku(edu,st.label); } }
  const d=document.createElement("div"); d.className="itemrow"; d.style.display="block";
  d.innerHTML=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
    <span class="tag">${c?c.name:"子"}</span>
    <span class="mini">在学中の教育費 合計 約 <b>${MAN(total)}万円</b>（うち塾・習い事 約 <b>${MAN(jukuTotal)}万円</b>）</span>
    <div style="max-width:150px;margin-left:auto"><label class="f">独立年齢</label><input type="number" data-k="independentAge" value="${edu.independentAge}"></div>
    <button class="btn danger sm">×</button></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
      <label class="f" style="margin:0">塾・習い事の目安</label>
      <select class="juku-plan" style="width:auto">${Object.entries(JUKU_PRESETS).map(([k,v])=>`<option value="${k}"${edu.jukuPlan===k?" selected":""}>${v.label}</option>`).join("")}</select>
    </div>
    <p class="mini" style="margin:-2px 0 8px">進路を選ぶと「学校の費用」と「塾・習い事」の目安が入ります。どちらも直接書き換えられます。中学受験や習い事中心などは上のプリセットで一括変更できます。大学は年数も変更できます。</p>
    <div class="edu-row" style="color:var(--sub);font-size:11px;border-bottom:1px solid var(--line)"><div class="edu-lab"></div><div>進路</div><div>学校の費用</div><div>塾・習い事</div></div>
    <div id="stg_${edu.id}"></div>`;
  d.querySelector("[data-k]").onchange=e=>{edu.independentAge=+e.target.value;commit();};
  d.querySelector(".danger").onclick=()=>{S.educations=S.educations.filter(x=>x!==edu);commit();};
  // 塾・習い事プリセットの変更（手入力の上書きはリセット）
  d.querySelector(".juku-plan").onchange=e=>{ edu.jukuPlan=e.target.value; edu.juku={}; commit(); };
  const sg=d.querySelector(`#stg_${edu.id}`);
  EDU_STAGES.forEach(st=>{
    const row=document.createElement("div"); row.className="edu-row";
    const sel=edu.choices[st.label]||st.opts[0];
    const school=eduSchool(edu,st.label);
    const juku=eduJuku(edu,st.label);
    const isNone=sel==="なし";
    row.innerHTML=`
      <div class="edu-lab">${st.uni?"大学等":st.label}</div>
      <select class="edu-sel">${st.opts.map(o=>`<option${o===sel?" selected":""}>${o}</option>`).join("")}</select>
      <div class="edu-amt"><input type="number" class="edu-amtin" value="${isNone?0:school}" ${isNone?"disabled":""}><span class="mini">万/年</span></div>
      ${st.uni
        ? `<div class="edu-yr"><input type="number" class="edu-yrin" value="${eduUniYears(edu)}" min="0" max="8" ${isNone?"disabled":""}><span class="mini">年間</span></div>`
        : `<div class="edu-amt"><input type="number" class="edu-jukuin" value="${isNone?0:juku}" ${isNone?"disabled":""}><span class="mini">万/年</span></div>`}`;
    // 進路の選択変更 → 学校・塾の手入力をリセットして目安を再表示、大学は年数も既定に
    row.querySelector(".edu-sel").onchange=e=>{
      edu.choices[st.label]=e.target.value;
      delete edu.amounts[st.label]; delete edu.juku[st.label];
      if(st.uni){ delete edu.uniYears; const y=18+eduUniYears(edu); if((+edu.independentAge||0)<y) edu.independentAge=y; }
      commit();
    };
    // 学校の費用の直接編集
    row.querySelector(".edu-amtin").onchange=e=>{ edu.amounts[st.label]=Math.max(0,+e.target.value||0); commit(); };
    // 塾・習い事の直接編集
    const jk=row.querySelector(".edu-jukuin");
    if(jk) jk.onchange=e=>{ edu.juku[st.label]=Math.max(0,+e.target.value||0); commit(); };
    // 大学の年数編集（独立年齢が不足なら自動で引き上げ）
    const yr=row.querySelector(".edu-yrin");
    if(yr) yr.onchange=e=>{ edu.uniYears=Math.max(0,+e.target.value||0); const y=18+eduUniYears(edu); if((+edu.independentAge||0)<y) edu.independentAge=y; commit(); };
    sg.appendChild(row);
  });
  return d;
}

        note="取り崩し額が0のため、積み立てる一方の想定です。老後に使うなら取り崩しも設定してみてください。";
      }
    }
    d.innerHTML=`
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
        <span class="tag">${inv?"投資":"預貯金"}</span>

        <div><label class="f">想定利回り（%/年）</label><input type="number" step="0.1" data-k="rate" value="${+a.rate||0}"></div>
        ${inv?`
        <div><label class="f">毎月の積立（万円）</label><input type="number" step="0.1" data-k="monthly" value="${+a.monthly||0}"></div>
        <div><label class="f">積立終了年齢</label><input type="number" data-k="accumEndAge" value="${+a.accumEndAge||64}"></div>
        <div><label class="f">取り崩し開始年齢</label><input type="number" data-k="drawStartAge" value="${+a.drawStartAge||65}"></div>
        <div><label class="f">毎月の取り崩し（万円）</label><input type="number" step="0.1" data-k="drawMonthly" value="${+a.drawMonthly||0}"></div>`:""}
      </div>
      ${note?`<p class="mini" style="margin-top:8px">${note}</p>`:""}`;
    d.querySelectorAll("[data-k]").forEach(inp=>inp.onchange=e=>{

    });
    d.querySelector("[data-rm]").onclick=()=>{ if(!confirm(`「${a.name}」を削除しますか？`)) return; S.assets=S.assets.filter(x=>x!==a); commit(); };
    al.appendChild(d);
  });
  document.getElementById("addCash").onclick=()=>{ S.assets.push({id:uid(),name:"預貯金",type:"cash",balance:0,rate:0}); commit(); };
  document.getElementById("addInv").onclick=()=>{ S.assets.push({id:uid(),name:"投資",type:"invest",balance:0,rate:3,monthly:1,accumEndAge:64,drawStartAge:65,drawMonthly:0}); commit(); };
}

    ["収支差額","balance","bal"],
    ["投資への積立","contrib","ex"],["投資の取り崩し","withdraw","in"],

  ];

function chartFrame(w,h){ return {w,h,pad:{l:52,r:14,t:14,b:34}}; }
function lineChart(rows){
  const f=chartFrame(Math.max(680,rows.length*9),260); const {w,h,pad}=f;
  const xs=rows.map(r=>r.primAge), ys=rows.map(r=>r.netWorth);
  const minY=Math.min(0,...ys), maxY=Math.max(...ys,1);
  const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  const X=a=>pad.l+ (a-xs[0])/(xs[xs.length-1]-xs[0])*iw;
  const Y=v=>pad.t+ (1-(v-minY)/(maxY-minY))*ih;
  const zeroY=Y(0);
  let path=rows.map((r,i)=>`${i?"L":"M"}${X(r.primAge).toFixed(1)},${Y(r.netWorth).toFixed(1)}`).join("");
  // grid + labels
  let grid="", ticks=4;
  for(let i=0;i<=ticks;i++){ const v=minY+(maxY-minY)*i/ticks; const y=Y(v);
    grid+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="var(--line)" stroke-width="1"/><text x="${pad.l-6}" y="${y+4}" text-anchor="end" font-size="11" fill="var(--sub)">${MAN(v)}</text>`;
  }
  let xlab="";
  for(let a=Math.ceil(xs[0]/10)*10; a<=xs[xs.length-1]; a+=10){ const x=X(a);
    xlab+=`<line x1="${x}" y1="${pad.t}" x2="${x}" y2="${h-pad.b}" stroke="var(--line)" stroke-width="1" opacity=".5"/><text x="${x}" y="${h-pad.b+16}" text-anchor="middle" font-size="11" fill="var(--sub)">${a}歳</text>`;
  }
  const neg=rows.find(r=>r.netWorth<0);
  let marker = neg?`<line x1="${X(neg.primAge)}" y1="${pad.t}" x2="${X(neg.primAge)}" y2="${h-pad.b}" stroke="var(--warn)" stroke-width="1.5" stroke-dasharray="4 3"/><text x="${X(neg.primAge)+4}" y="${pad.t+12}" font-size="11" fill="var(--warn)">${neg.primAge}歳で資産0</text>`:"";
  // 投資部分をエリア表示（現金との内訳が見える）
  let investArea="", legend="";
  if(rows[0]&&rows[0].invest!=null){
    const pts=rows.map(r=>`${X(r.primAge).toFixed(1)},${Y(Math.max(0,r.invest)).toFixed(1)}`).join(" ");
    investArea=`<polygon points="${X(rows[0].primAge).toFixed(1)},${zeroY.toFixed(1)} ${pts} ${X(rows[rows.length-1].primAge).toFixed(1)},${zeroY.toFixed(1)}" fill="var(--accent2)" opacity="0.25"/>`;
    legend=`<div class="legend"><span><i style="background:var(--accent)"></i>資産合計（現金＋投資）</span><span><i style="background:var(--accent2);opacity:.45"></i>うち投資</span></div>`;
  }
  return `<svg width="${w}" height="${h}" role="img" style="max-width:none">
    ${grid}${xlab}
    ${investArea}
    <line x1="${pad.l}" y1="${zeroY}" x2="${w-pad.r}" y2="${zeroY}" stroke="var(--sub)" stroke-width="1"/>
    <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2"/>
    ${marker}</svg>`+legend;
}
function balanceBars(rows){
  const step=Math.max(6,Math.floor(680/rows.length));
  const w=Math.max(680,rows.length*step), h=240, pad={l:52,r:14,t:14,b:30};
  const vals=rows.map(r=>r.balance);
  const maxV=Math.max(1,...vals.map(Math.abs));
  const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b, midY=pad.t+ih/2;
  const bw=Math.max(2,iw/rows.length-1);
  let bars=rows.map((r,i)=>{
    const x=pad.l+i*(iw/rows.length);
    const bh=Math.abs(r.balance)/maxV*(ih/2);
    const y=r.balance>=0?midY-bh:midY;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${r.balance>=0?"var(--pos)":"var(--neg)"}"/>`;
  }).join("");
  let grid=`<line x1="${pad.l}" y1="${midY}" x2="${w-pad.r}" y2="${midY}" stroke="var(--sub)"/>`;
  grid+=`<text x="${pad.l-6}" y="${midY+4}" text-anchor="end" font-size="11" fill="var(--sub)">0</text>`;
  grid+=`<text x="${pad.l-6}" y="${pad.t+10}" text-anchor="end" font-size="11" fill="var(--sub)">+${MAN(maxV)}</text>`;
  grid+=`<text x="${pad.l-6}" y="${h-pad.b}" text-anchor="end" font-size="11" fill="var(--sub)">-${MAN(maxV)}</text>`;
  let xlab="";
  for(let i=0;i<rows.length;i+=10){ const x=pad.l+i*(iw/rows.length); xlab+=`<text x="${x}" y="${h-6}" text-anchor="middle" font-size="11" fill="var(--sub)">${rows[i].primAge}歳</text>`; }
  return `<svg width="${w}" height="${h}" role="img" style="max-width:none">${grid}${bars}${xlab}</svg>`;
}
function stackedExpense(rows){
  const keys=[["living","#4fb39a"],["housing","#6ba0d8"],["education","#e0a13a"],["car","#c07f5c"],["appliance","#7fb069"],["other_exp","#9b8bd0"],["tax","#8a8a80"],["insurance","#d47ba0"]];
  const picked=rows.filter((r,i)=>i%5===0);
  const w=Math.max(680,picked.length*54+70), h=260, pad={l:52,r:14,t:14,b:34};
  const totals=picked.map(r=>keys.reduce((s,[k])=>s+Math.max(0,r[k]),0));
  const maxV=Math.max(1,...totals);
  const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  const bw=Math.min(40,iw/picked.length-8);
  let bars=picked.map((r,i)=>{
    const x=pad.l+i*(iw/picked.length)+ (iw/picked.length-bw)/2;
    let y=pad.t+ih, seg="";
    keys.forEach(([k,c])=>{ const v=Math.max(0,r[k]); const bh=v/maxV*ih; y-=bh;
      if(bh>0) seg+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${c}"/>`; });
    seg+=`<text x="${(x+bw/2).toFixed(1)}" y="${h-pad.b+16}" text-anchor="middle" font-size="10" fill="var(--sub)">${r.primAge}</text>`;
    return seg;
  }).join("");
  let grid="";
  for(let i=0;i<=4;i++){ const v=maxV*i/4, y=pad.t+ih-(v/maxV*ih);
    grid+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="var(--line)"/><text x="${pad.l-6}" y="${y+4}" text-anchor="end" font-size="11" fill="var(--sub)">${MAN(v)}</text>`; }
  return `<svg width="${w}" height="${h}" role="img" style="max-width:none">${grid}${bars}<text x="${pad.l}" y="${h-6}" font-size="11" fill="var(--sub)">（本人年齢・万円/年）</text></svg>`;
}

// ある年の「月次プラン（万円/月）」を経常項目とイベントに分けて返す
function monthlyPlan(year){
  const {rows,sched}=computeCF();
  const row=rows.find(r=>r.year===year);
  if(!row) return null;
  const loan=S.housing.loan;
  let rentLoan=0;
  for(const r of S.housing.rent){ if(year>=r.fromYear&&year<=r.toYear) rentLoan+=r.monthly*12; }
  rentLoan+=sched.pay[year]||0;
  const incomeNet=Math.max(0,row.incomeTotal-row.tax);
  return {
    row,
    recur:{
      income: incomeNet/12,
      living: row.living/12,
      housing: rentLoan/12,
      insurance: row.insurance/12,
      invest: row.contrib/12,
    },
    // イベント（年額）: 住宅維持・車・教育・その他（家電買替含む）
    events:{
      housing: row.housing - rentLoan,
      car: row.car,
      education: row.education,
      other: row.other_exp + row.appliance,
    }
  };
}

/* ========== シナリオ比較 ========== */
function planSnapData(){ return JSON.parse(JSON.stringify(Object.assign({},S,{scenarios:undefined,activeScenarioId:undefined,kakeibo:undefined,_updatedAt:undefined}))); }
function planStrip(d){ return JSON.stringify(Object.assign({},d,{scenarios:undefined,activeScenarioId:undefined,kakeibo:undefined,_updatedAt:undefined})); }
function renderScenario(){
  const el=document.getElementById("tab-scenario");
  if(!Array.isArray(S.scenarios)) S.scenarios=[];
  const esc=t=>String(t||"").replace(/</g,"&lt;");
  const active=S.scenarios.find(x=>x.id===S.activeScenarioId)||null;
  const dirty=active?planStrip(S)!==planStrip(active.data):true;
  const cur=computeCF();
  const rowsFor=snap=>{ const bak=S; try{ S=snap.data; return computeCF(); } finally{ S=bak; } };
  const met=o=>{ const rows=o.rows, end=rows[rows.length-1];
    const neg=rows.find(r=>r.netWorth<0);
    return { peak:rows.reduce((a,r)=>Math.max(a,r.netWorth),-1e9),
      negAge:neg?neg.primAge:null, final:end.netWorth,
      a65:(rows.find(r=>r.primAge>=65)||end).netWorth };
  };

function scenarioChart(baseRows, others){
  const all=[baseRows,...others];
  const pad={l:52,r:14,t:14,b:30}, w=680, h=260, iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  const ages=baseRows.map(r=>r.primAge);
  const a0=ages[0], a1=ages[ages.length-1];
  let minY=0,maxY=1; all.forEach(rs=>rs.forEach(r=>{ minY=Math.min(minY,r.netWorth); maxY=Math.max(maxY,r.netWorth); }));
  const X=a=>pad.l+(a-a0)/(a1-a0||1)*iw, Y=v=>pad.t+(1-(v-minY)/(maxY-minY||1))*ih;
  const line=(rs,col)=>`<path d="${rs.map((r,i)=>`${i?"L":"M"}${X(r.primAge).toFixed(1)},${Y(r.netWorth).toFixed(1)}`).join("")}" fill="none" stroke="${col}" stroke-width="2"/>`;
  let grid="";
  for(let i=0;i<=4;i++){ const v=minY+(maxY-minY)*i/4, y=Y(v); grid+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="var(--line)"/><text x="${pad.l-6}" y="${y+4}" text-anchor="end" font-size="11" fill="var(--sub)">${MAN(v)}</text>`; }
  for(let a=Math.ceil(a0/10)*10;a<=a1;a+=10){ grid+=`<text x="${X(a)}" y="${h-pad.b+16}" text-anchor="middle" font-size="11" fill="var(--sub)">${a}歳</text>`; }
  const zeroY=Y(0);
  return `<svg width="${w}" height="${h}" role="img" style="max-width:none">${grid}<line x1="${pad.l}" y1="${zeroY}" x2="${w-pad.r}" y2="${zeroY}" stroke="var(--sub)"/>${others.map((rs,i)=>line(rs,catColor(i+1))).join("")}${line(baseRows,"var(--accent)")}</svg>`;
}

    if(inc.type==="pension") add(m.birthYear+(+inc.claimAge||65),`${m.name} 年金受給開始`);

  (S.housing.loan&&S.housing.loan.prepays||[]).forEach(p=>{ if(+p.amount>0) add(+p.year,`繰上返済 ${MAN(p.amount)}万`); });
  // 大きな支出イベント（車・その他の周期支出、住宅メンテ）
  S.expenses.forEach(e=>{ if(e.amount<50) return; const t=member(e.targetId)||prim;
    for(let a=e.fromAge;a<=e.toAge;a+=Math.max(1,e.cycle)){ add(t.birthYear+a,`${e.name} ${MAN(e.amount)}万`); }
  });
  S.housing.maintenance.forEach(mt=>{ if(mt.annual<50) return;
    for(let a=mt.fromAge;a<=mt.toAge;a+=Math.max(1,mt.cycle)){ add(prim.birthYear+a,`${mt.name} ${MAN(mt.annual)}万`); }

  // 電化製品の買い替え（10万円以上のみ表示）
  const lastYear=rows.length?rows[rows.length-1].year:S.baseYear;
  (S.appliances||[]).forEach(ap=>{

  });
  // 投資枯渇
  (assetInfo||[]).forEach(x=>{ if(x.depleteYear) add(x.depleteYear,`投資「${x.name}」枯渇`); });

        </div></div>`;

/* ========== 万一の備え（遺族シミュレーション） ========== */
function emgNeed(d){
  // 遺族の資産が生涯マイナスにならないために必要な死亡保険金（総額）を逆算
  const minNW=ins=>{ const o=computeCF({death:Object.assign({},d,{insurance:ins})}); return o.rows.reduce((a,r)=>Math.min(a,r.netWorth),Infinity); };
  const m0=minNW(0);
  if(m0>=0) return {need:0, margin:m0};
  let lo=0, hi=1000;
  while(minNW(hi)<0 && hi<1e6) hi*=2;
  for(let i=0;i<24;i++){ const mid=(lo+hi)/2; if(minNW(mid)>=0) hi=mid; else lo=mid; }
  return {need:Math.ceil(hi/10)*10, margin:null};
}
/* 対象者の死亡保険（保険設定）の合計保険金額。includeCandidateで検討中も含める */
function lifeInsFor(memberId, atYear, includeCandidate){
  const t=member(memberId); if(!t) return 0;
  const a=atYear-t.birthYear;
  return (S.insurances||[]).filter(p=>p.type==="life"&&p.memberId===memberId&&a<=(+p.toAge||100)&&(p.status!=="candidate"||includeCandidate)).reduce((s,p)=>s+(+p.amount||0),0);
}
/* 検討中の保険が1件でもあるか */
function hasCandidateIns(){ return (S.insurances||[]).some(p=>p.status==="candidate"); }
/* 追加でかかる検討中の年間保険料（現在の対象者年齢で有効なもの） */
function candidatePremium(){
  return (S.insurances||[]).filter(p=>p.status==="candidate").reduce((s,p)=>{
    const t=member(p.memberId); if(!t) return s;
    const a=S.baseYear-t.birthYear;
    const limit=p.type==="pension_edu"?(+p.premiumToAge||100):(+p.toAge||100);
    return s+(a>=0&&a<=limit?(+p.premium||0):0);
  },0);
}
/* 高額療養費: 月の医療費(万円)に対する自己負担額(万円・70歳未満の概算) */
function hiCostSelfPay(annualSalMan, medCostMan){
  const c=medCostMan*10000;
  let cap;
  if(annualSalMan<370) cap=57600;
  else if(annualSalMan<770) cap=80100+Math.max(0,c-267000)*0.01;
  else if(annualSalMan<1160) cap=167400+Math.max(0,c-558000)*0.01;
  else cap=252600+Math.max(0,c-842000)*0.01;
  return Math.min(c*0.3,cap)/10000;
}
/* 就業不能時に資産がマイナスにならないための必要保障（月額・総額）を逆算 */
function disNeed(d){
  const minNW=x=>{ const o=computeCF({disable:Object.assign({},d,{extraMonthly:x})}); return o.rows.reduce((a,r)=>Math.min(a,r.netWorth),Infinity); };
  if(minNW(0)>=0) return 0;
  let lo=0, hi=5;
  while(minNW(hi)<0 && hi<300) hi*=2;
  if(minNW(hi)<0) return null; // 保障だけでは補えない
  for(let i=0;i<18;i++){ const mid=(lo+hi)/2; if(minNW(mid)>=0) hi=mid; else lo=mid; }
  return Math.ceil(hi*2)/2;
}

function renderEmgSummary(){
  const el=document.getElementById("emgBody");
  const em=S.emergency;

  const spouse=S.members.find(m=>m.role==="spouse");
  const yearD=Math.max(S.baseYear,+em.year||(S.baseYear+1));
  const cash=S.assets.filter(a=>a.type!=="invest").reduce((s,a)=>s+(+a.balance||0),0);
  const cand=hasCandidateIns();
  const items=[];
  const push=(k,st,msg,add)=>items.push({k,st,msg,add});
  // 死亡保障
  [self,spouse].filter(Boolean).forEach(t=>{
    const {need}=emgNeed({memberId:t.id,year:yearD,danshin:em.danshin,livingPct:em.livingPct});
    const cur=lifeInsFor(t.id,yearD)+(+(em.ins[t.id]||0));
    const curC=lifeInsFor(t.id,yearD,true)+(+(em.ins[t.id]||0));
    let st,msg;
    if(need===0){ st=cur>500?"△":"good"; msg=cur>500?`保障がなくても遺族の資産は維持できる試算です。現在 ${MAN(cur)}万円 → 減額（保険料の節約）を検討する余地があります`:`保障がなくても遺族の資産は維持できる試算です`; }
    else if(cur>=need){ st="good"; msg=`必要保障額 ${MAN(need)}万円 に対し ${MAN(cur)}万円 → 充足しています`; }
    else { st="warn"; msg=`必要保障額 ${MAN(need)}万円 に対し ${MAN(cur)}万円 → あと ${MAN(need-cur)}万円 不足`; }
    const add=(cand&&curC>cur)?(need>0&&curC>=need?`検討中を追加すると ${MAN(curC)}万円 → 充足 ✓`:`検討中を追加すると ${MAN(curC)}万円（まだ ${MAN(Math.max(0,need-curC))}万円 不足）`):null;
    push(`死亡保障（${t.name}）`,st,msg,add);
  });
  // 医療保障（例: 入院60日・医療費150万円）
  {
    const age=S.baseYear-self.birthYear;
    const sal=S.incomes.filter(i=>i.type==="salary"&&i.memberId===self.id).reduce((s,i)=>s+salaryAt(i,age),0);
    const ex=2*hiCostSelfPay(sal,75)+60*0.2;

    const net=ex-medBen, netC=ex-medBenC;
    push("医療保障（本人）", net<=cash?"good":"warn",
      `入院60日・医療費150万円の例: 公的保障後の負担 約${ex.toFixed(0)}万円${medBen>0?`、保険給付 約${medBen.toFixed(0)}万円`:"（医療保険の登録なし）"} → ${net<=0?"保険でカバーできます":net<=cash?`貯蓄 ${MAN(cash)}万円 で対応できる範囲です`:"貯蓄を超える負担の可能性があります"}`,
      (cand&&medBenC>medBen)?`検討中を追加すると給付 約${medBenC.toFixed(0)}万円・自己負担 約${netC.toFixed(0)}万円`:null);
  }
  // 就業不能（本人）
  {
    const needM=disNeed({memberId:self.id,year:yearD,salaried:em.dis.salaried,useIns:false});
    const dm=inclC=>(S.insurances||[]).filter(p=>p.type==="disability"&&p.memberId===self.id&&(inclC||p.status!=="candidate")).reduce((s,p)=>s+(+p.monthly||0),0);
    const curM=dm(false), curMC=dm(true);
    let st,msg;
    if(needM===0){ st=curM>0?"△":"good"; msg=curM>0?`公的保障と資産だけでも維持できる試算です。現在 月${curM}万円 → 見直しの余地があります`:"公的保障（傷病手当金・障害年金）と資産で維持できる試算です"; }
    else if(needM==null){ st="warn"; msg="保障の上乗せだけでは不足します。支出の見直しと合わせて検討を"; }
    else if(curM>=needM){ st="good"; msg=`必要 月${needM}万円 に対し 月${curM}万円 → 充足しています`; }
    else { st="warn"; msg=`必要 月${needM}万円 に対し 月${curM}万円 → 月あと${(needM-curM).toFixed(1)}万円 不足`; }
    const add=(cand&&curMC>curM)?(needM>0&&curMC>=needM?`検討中を追加すると 月${curMC}万円 → 充足 ✓`:`検討中を追加すると 月${curMC}万円`):null;
    push("就業不能保障（本人）",st,msg,add);
