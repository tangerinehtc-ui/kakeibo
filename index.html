<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#2f7d6b">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>家計簿ライフプラン — キャッシュフロー予測</title>
<style>
:root{
  --bg:#f5f4ef; --card:#ffffff; --ink:#23231f; --sub:#6b6a63; --line:#e2e0d7;
  --accent:#2f7d6b; --accent2:#3a6ea5; --warn:#c0492f; --pos:#2f7d6b; --neg:#c0492f;
  --chip:#eef0ec; --radius:12px;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#1b1b19; --card:#26261f; --ink:#eceadf; --sub:#a3a196; --line:#3a3a32;
    --accent:#4fb39a; --accent2:#6ba0d8; --warn:#e0765c; --pos:#4fb39a; --neg:#e0765c; --chip:#31312a; }
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;line-height:1.6;font-size:15px}
header{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:600;margin:0;flex:1;min-width:180px}
header .tools{display:flex;gap:8px;flex-wrap:wrap}
button,select,input{font-family:inherit;font-size:14px;color:inherit}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 13px;cursor:pointer}
.btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--line)}
.btn.sm{padding:4px 9px;font-size:13px}
.btn.danger{background:transparent;color:var(--neg);border:1px solid var(--line)}
nav{display:flex;gap:4px;overflow-x:auto;padding:8px 12px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:53px;z-index:19}
nav button{white-space:nowrap;background:transparent;border:none;padding:7px 13px;border-radius:8px;cursor:pointer;color:var(--sub)}
nav button.on{background:var(--chip);color:var(--ink);font-weight:600}
main{max-width:1120px;margin:0 auto;padding:16px}
.tab{display:none}
.tab.on{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.card h2{font-size:16px;margin:0 0 4px}
.card .hint{color:var(--sub);font-size:13px;margin:0 0 12px}
label.f{display:block;font-size:13px;color:var(--sub);margin-bottom:3px}
input[type=text],input[type=number],select{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--bg)}
input[type=number]{text-align:right}
.grid{display:grid;gap:10px}
.row{display:grid;gap:8px;align-items:end;margin-bottom:8px}
.tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius)}
table.data{border-collapse:collapse;width:100%;font-size:13px}
table.data th,table.data td{padding:5px 8px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line)}
table.data th:first-child,table.data td:first-child{text-align:left;position:sticky;left:0;background:var(--card);z-index:1}
table.data thead th{background:var(--chip);position:sticky;top:0;z-index:2}
table.data thead th:first-child{z-index:3}
table.data tr.total td{font-weight:600;border-top:2px solid var(--line)}
table.data td.neg{color:var(--neg)}
td.negyear,th.negyear{background:rgba(192,73,47,.14)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.kpi{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px}
.kpi .lab{font-size:12px;color:var(--sub)}
.kpi .val{font-size:22px;font-weight:600;margin-top:2px}
.kpi .val.warn{color:var(--warn)}
.itemrow{display:grid;gap:8px;align-items:end;padding:10px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--bg)}
.itemrow .rm{grid-column:span 1}
.mini{font-size:12px;color:var(--sub)}
.seg{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.seg input{width:90px}
.tag{display:inline-block;background:var(--chip);border-radius:20px;padding:2px 10px;font-size:12px;color:var(--sub);margin-right:6px}
.chartbox{width:100%;overflow-x:auto}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--sub);margin-top:8px}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.addbtn{margin-top:4px}
details.help{margin-top:8px}
details.help summary{cursor:pointer;color:var(--sub);font-size:13px}
.kform input,.kform select{font-size:16px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--chip);border:1px solid var(--line);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:13px;color:var(--sub)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.seg2{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;width:max-content}
.seg2 button{border:none;background:transparent;padding:8px 18px;cursor:pointer;color:var(--sub);font-size:15px}
.seg2 button.on{background:var(--accent);color:#fff}
.entry{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--line);font-size:14px}
.entry .cat{background:var(--chip);border-radius:6px;padding:1px 8px;font-size:12px;color:var(--sub);white-space:nowrap}
.entry .amt{margin-left:auto;font-weight:600;white-space:nowrap}
.entry .amt.in{color:var(--pos)}
.catbar{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:13px}
.catbar .bar{height:9px;border-radius:5px;background:var(--accent2);min-width:2px}
.monthnav{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.monthnav b{font-size:17px;min-width:120px;text-align:center}
.pbar{background:var(--chip);border-radius:6px;height:12px;margin-top:8px;overflow:hidden}
.pbar>div{height:100%;border-radius:6px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-h{text-align:center;font-size:12px;color:var(--sub);padding:3px 0}
.cal-h.sun,.cal-d.sun{color:var(--neg)}
.cal-h.sat,.cal-d.sat{color:var(--accent2)}
.cal-cell{min-height:58px;border:1px solid var(--line);border-radius:6px;padding:3px;font-size:11px;cursor:pointer;background:var(--bg);overflow:hidden}
.cal-cell.empty{border:none;background:transparent;cursor:default}
.cal-cell.today{background:var(--chip)}
.cal-cell.sel{border:2px solid var(--accent);padding:2px}
.cal-d{font-size:12px;color:var(--sub);line-height:1.3}
.cal-e{color:var(--neg);font-weight:600;line-height:1.3;white-space:nowrap}
.cal-i{color:var(--pos);font-weight:600;line-height:1.3;white-space:nowrap}
#gearBtn{margin-left:auto;white-space:nowrap}
.brow{display:grid;grid-template-columns:96px 100px 1fr;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.brow:last-child{border-bottom:none}
.brow .bname{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brow input{padding:6px 7px}
.brow.total{border-top:2px solid var(--line)}
.brow.total .bname{font-weight:600}
@media(max-width:640px){
  header h1{display:none}
  nav{position:fixed;left:0;right:0;bottom:0;top:auto;border-top:1px solid var(--line);border-bottom:none;z-index:30;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom,0px))}
  nav button{flex:1;text-align:center;padding:10px 2px;font-size:13px}
  main{padding-bottom:90px}
  .brow{grid-template-columns:88px 92px 1fr;gap:6px}
}
.tl-row{display:grid;grid-template-columns:64px 1fr;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.tl-year{font-weight:600;text-align:center;color:var(--sub)}
.tl-row.heavy .tl-year{color:var(--neg)}
.tl-ev{display:inline-block;background:var(--chip);border-radius:6px;padding:2px 8px;font-size:12px;margin:2px 4px 2px 0}
@media print{
  header,nav,#gearBtn,.tools,#printBtn,#updBar,#storageWarn{display:none !important}
  main{padding:0;max-width:none}
  .card{border:1px solid #ccc;break-inside:avoid;box-shadow:none}
  .chip:not(.on){display:none}
  body{background:#fff}
}
@media(max-width:600px){ main{padding:10px} .card{padding:12px} }
/* ライフプラン診断 */
.diag-badge{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.diag-rank{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#fff;flex:none}
.diag-rank.A{background:#2f9e6b}.diag-rank.B{background:#5aa84a}.diag-rank.C{background:#c9a227}.diag-rank.D{background:#d07b2f}.diag-rank.E{background:#c0492f}
.diag-item{border-top:1px solid var(--line);padding:10px 0}
.diag-item .h{display:flex;align-items:center;gap:8px;font-size:14px}
.diag-item .ic{font-size:16px;flex:none}
.diag-item .ic.good{color:var(--pos)}.diag-item .ic.ok{color:var(--accent2)}.diag-item .ic.warn{color:var(--neg)}
.diag-item .k{font-weight:600}
.diag-item .msg{color:var(--sub);font-size:13px;margin:2px 0 0 24px}
.diag-item .adv{font-size:13px;margin:6px 0 0 24px;padding:8px 10px;background:var(--bg);border-radius:8px;border-left:3px solid var(--accent)}
/* かんたん設定ガイド（ウィザード） */
#wizard{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.45);align-items:center;justify-content:center;padding:12px}
.wzbox{background:var(--card);border-radius:16px;width:100%;max-width:520px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.35)}
.wzhead{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);font-weight:600}
.wzhead .x{margin-left:auto;background:transparent;border:none;font-size:22px;cursor:pointer;color:var(--sub);line-height:1;padding:0 4px}
.wzprog{height:4px;background:var(--chip)}
.wzprog>div{height:100%;background:var(--accent);transition:width .3s;width:0}
.wzlog{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;min-height:180px}
.wzb{max-width:86%;padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.5;white-space:normal}
.wzb.bot{align-self:flex-start;background:var(--chip);border-bottom-left-radius:4px}
.wzb.me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.wzinput{border-top:1px solid var(--line);padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.wzopts{display:flex;flex-wrap:wrap;gap:8px}
.wzopts button{background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:9px 15px;cursor:pointer;color:var(--ink);font-size:14px}
.wzopts button:hover{border-color:var(--accent);color:var(--accent)}
.wznum{display:flex;gap:8px;align-items:center}
.wznum input{flex:1}
.wzrow{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.wzskip{background:transparent;border:none;color:var(--sub);font-size:13px;cursor:pointer;text-decoration:underline;padding:2px}
.wzsum{font-size:13px;max-height:34vh;overflow-y:auto}
.wzsum div{display:flex;justify-content:space-between;gap:10px;padding:4px 0;border-bottom:1px dashed var(--line)}
.wzsum div b{text-align:right}
</style>
</head>
<body>
<header>
  <h1>家計簿ライフプラン</h1>
  <div class="seg2">
    <button id="modeK">家計簿</button>
    <button id="modeP">ライフプラン</button>
  </div>
  <button class="btn ghost sm" id="gearBtn" title="設定" aria-label="設定">⚙ 設定</button>
</header>
<nav id="nav"></nav>
<main>
  <section class="tab" data-tab="khome" id="tab-khome"></section>
  <section class="tab" data-tab="kinput" id="tab-kinput"></section>
  <section class="tab" data-tab="kmanage" id="tab-kmanage"></section>
  <section class="tab" data-tab="home" id="tab-home"></section>
  <section class="tab" data-tab="plan" id="tab-plan"></section>
  <section class="tab" data-tab="yojitsu" id="tab-yojitsu"></section>
  <section class="tab" data-tab="analysis" id="tab-analysis"></section>
  <section class="tab" data-tab="scenario" id="tab-scenario"></section>
  <section class="tab" data-tab="settings" id="tab-settings"></section>
</main>

<script>
"use strict";
const APP_VERSION = "2026.07.19-2";
const MAN = v => (v==null||isNaN(v))?"0":Math.round(v).toLocaleString("ja-JP");
const uid = () => Math.random().toString(36).slice(2,9);
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));

/* ---------- 教育費プリセット（万円/年・目安） ---------- */
const EDU = {
  "保育園(認可)":30,"幼稚園(公立)":15,"幼稚園(私立)":31,
  "小学校(公立)":35,"小学校(私立)":167,
  "中学校(公立)":54,"中学校(私立)":144,
  "高校(公立)":51,"高校(私立)":105,
  "大学(国公立)":61,"大学(私立文系)":118,"大学(私立理系)":156,"大学(私立医歯)":350
};
const EDU_STAGES = [
  {label:"未就学(0-2)",from:0,to:2,opts:["保育園(認可)","なし"]},
  {label:"未就学(3-5)",from:3,to:5,opts:["幼稚園(公立)","幼稚園(私立)","保育園(認可)"]},
  {label:"小学校",from:6,to:11,opts:["小学校(公立)","小学校(私立)"]},
  {label:"中学校",from:12,to:14,opts:["中学校(公立)","中学校(私立)"]},
  {label:"高校",from:15,to:17,opts:["高校(公立)","高校(私立)"]},
  {label:"大学",from:18,to:21,opts:["大学(国公立)","大学(私立文系)","大学(私立理系)","大学(私立医歯)","なし"]}
];

/* ---------- 電化製品プリセット（名前・耐用年数・金額万円） ---------- */
const APPL_PRESETS=[
  ["冷蔵庫",13,15],["洗濯機",10,12],["エアコン",12,12],["テレビ",9,10],
  ["電子レンジ",10,3],["炊飯器",6,3],["掃除機",7,4],["給湯器",12,20],
  ["パソコン",6,15],["スマートフォン",4,10]
];
const APPL_STD=8; // 先頭8つを「標準セット」として扱う（給湯器まで）
function applStdSet(boughtYear, withBoiler){
  return APPL_PRESETS.slice(0, withBoiler?APPL_STD:APPL_STD-1)
    .map(([name,ly,price])=>({id:uid(),name,lifeYears:ly,price,boughtYear}));
}

/* ---------- 初期データ（平山様CFをおおよそ再現） ---------- */
function seed(){
  return {
    baseYear:2026,
    inflation:0,
    members:[
      {id:"self",  name:"ご本人", role:"self",   birthYear:1995, lifespan:90},
      {id:"spouse",name:"配偶者", role:"spouse", birthYear:1995, lifespan:100},
      {id:"c1",    name:"第1子",  role:"child",  birthYear:2023, lifespan:90},
      {id:"c2",    name:"第2子",  role:"child",  birthYear:2026, lifespan:90}
    ],
    incomes:[
      {id:uid(),memberId:"self",  type:"salary", endAge:65, points:[{age:27,annual:500},{age:64,annual:650}]},
      {id:uid(),memberId:"spouse",type:"salary", endAge:65, points:[{age:27,annual:500},{age:29,annual:400},{age:37,annual:250},{age:43,annual:400},{age:64,annual:600}]},
      {id:uid(),memberId:"self",  type:"pension", startAge:65, claimAge:65, annual:192},
      {id:uid(),memberId:"spouse",type:"pension", startAge:65, claimAge:65, annual:168}
    ],
    living:[
      {from:27,to:54,monthly:18},
      {from:55,to:64,monthly:35},
      {from:65,to:120,monthly:30}
    ],
    housing:{
      rent:[{fromYear:2023,toYear:2023,monthly:8}],
      loan:{on:true, principal:4860, rate:1.2, termYears:35, startYear:2024, deductOn:true, deductYears:13, deductRate:0.7, deductCap:35, rate2:0, rate2From:0, rate3:0, rate3From:0, prepays:[]},
      maintenance:[
        {name:"固定資産税",annual:15,fromAge:28,toAge:100,cycle:1},
        {name:"火災保険料",annual:25,fromAge:28,toAge:100,cycle:5},
        {name:"住宅メンテ",annual:100,fromAge:38,toAge:100,cycle:10},
        {name:"水回りリフォーム",annual:200,fromAge:48,toAge:100,cycle:10}
      ]
    },
    expenses:[
      {id:uid(),category:"車両費",name:"車購入",targetId:"self",amount:250,fromAge:35,toAge:80,cycle:10},
      {id:uid(),category:"車両費",name:"車維持費",targetId:"self",amount:35,fromAge:27,toAge:80,cycle:1},
      {id:uid(),category:"その他・将来の夢",name:"旅行",targetId:"self",amount:20,fromAge:30,toAge:55,cycle:1},
      {id:uid(),category:"その他・将来の夢",name:"家具・家電",targetId:"self",amount:100,fromAge:28,toAge:28,cycle:1},
      {id:uid(),category:"支払保険料",name:"生命保険料",targetId:"self",amount:40,fromAge:27,toAge:64,cycle:1}
    ],
    educations:[
      {id:uid(),childId:"c1",independentAge:22,choices:{"未就学(0-2)":"保育園(認可)","未就学(3-5)":"幼稚園(私立)","小学校":"小学校(公立)","中学校":"中学校(公立)","高校":"高校(私立)","大学":"大学(私立理系)"}},
      {id:uid(),childId:"c2",independentAge:22,choices:{"未就学(0-2)":"保育園(認可)","未就学(3-5)":"幼稚園(私立)","小学校":"小学校(公立)","中学校":"中学校(公立)","高校":"高校(公立)","大学":"大学(私立文系)"}}
    ],
    assets:[
      {id:uid(),name:"預貯金",type:"cash",balance:300,rate:0.1},
      {id:uid(),name:"つみたてNISA等",type:"invest",balance:36,rate:3.0,monthly:1.5,accumEndAge:64,drawStartAge:65,drawMonthly:5}
    ],
    appliances: applStdSet(2024, true)
  };
}

/* ---------- 状態管理 ---------- */
const KEY="kakeibo_lifeplan_v1";
let S = load();
let storageOK = true;
function load(){ try{const r=localStorage.getItem(KEY); if(r) return JSON.parse(r);}catch(e){} return seed(); }
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(S)); }
  catch(e){ if(storageOK){ storageOK=false; showStorageWarning(); } }
}
function commit(){ S._updatedAt=new Date().toISOString(); save(); render(); scheduleSync(); }
function showStorageWarning(){
  if(document.getElementById("storageWarn")) return;
  const bar=document.createElement("div");
  bar.id="storageWarn";
  bar.style.cssText="background:#c0492f;color:#fff;padding:8px 16px;font-size:13px;text-align:center";
  bar.innerHTML='このブラウザではファイルを直接開くと自動保存できません。編集はこのセッション中は保持されますが、閉じると消えます。右上の<b>エクスポート</b>でバックアップを取り、次回<b>インポート</b>してください。';
  document.body.insertBefore(bar, document.body.firstChild);
}

function member(id){ return S.members.find(m=>m.id===id); }
function ageInYear(m, year){ return year - m.birthYear; }

/* ---------- プランデータの補完・旧形式からの移行 ---------- */
function ensurePlanModel(){
  if(S.inflation==null) S.inflation=0;
  if(!Array.isArray(S.appliances)) S.appliances=[];
  if(!Array.isArray(S.assets)) S.assets=[];
  S.assets.forEach(a=>{
    if(!a.id) a.id=uid();
    if(a.type!=="invest"&&a.type!=="cash") a.type="cash"; // 旧形式は預貯金扱い
    if(a.rate==null) a.rate=0;
    if(a.type==="invest"){
      if(a.monthly==null) a.monthly=0;
      if(a.accumEndAge==null) a.accumEndAge=64;
      if(a.drawStartAge==null) a.drawStartAge=65;
      if(a.drawMonthly==null) a.drawMonthly=0;
    }
  });
  (S.incomes||[]).forEach(inc=>{ if(inc.type==="pension"&&inc.claimAge==null) inc.claimAge=inc.startAge||65; });
  const l=S.housing&&S.housing.loan;
  if(l){
    if(l.rate2==null){ l.rate2=0; l.rate2From=0; }
    if(l.rate3==null){ l.rate3=0; l.rate3From=0; }
    if(!Array.isArray(l.prepays)) l.prepays=[];
  }
}

/* ---------- 年金の繰上げ・繰下げ（65歳基準／繰上げ-0.4%/月・繰下げ+0.7%/月） ---------- */
function pensionFactor(claimAge){
  const c=clamp(+claimAge||65,60,75);
  return c>=65 ? 1+0.007*12*(c-65) : 1-0.004*12*(65-c);
}

/* ---------- 税・社会保険料（簡易・実効負担率） ---------- */
function taxOn(annual){
  if(annual<=0) return 0;
  let r;
  if(annual<100) r=.08; else if(annual<300) r=.14; else if(annual<500) r=.19;
  else if(annual<700) r=.24; else if(annual<900) r=.27; else if(annual<1200) r=.30; else r=.33;
  return annual*r;
}
function pensionTax(annual){ return annual>0 ? annual*0.10 : 0; }

/* ---------- 給与カーブ補間 ---------- */
function salaryAt(inc, age){
  const p=[...inc.points].sort((a,b)=>a.age-b.age);
  if(age>=inc.endAge || !p.length) return 0;
  if(age<p[0].age) return 0;
  if(age>=p[p.length-1].age) return p[p.length-1].annual;
  for(let i=0;i<p.length-1;i++){
    if(age>=p[i].age && age<p[i+1].age){
      const t=(age-p[i].age)/(p[i+1].age-p[i].age);
      return p[i].annual + t*(p[i+1].annual-p[i].annual);
    }
  }
  return 0;
}

/* ---------- 住宅ローン（月次償還・段階金利・繰上返済対応） ---------- */
function loanSchedule(loan, opt){
  const res={pay:{},interest:{},balEnd:{},payoffYear:null,totalInterest:0,initialMonthly:0};
  if(!loan||!loan.on||loan.principal<=0||loan.termYears<=0) return res;
  const usePrepay=!(opt&&opt.noPrepay);
  const n=loan.termYears*12;
  let bal=loan.principal, pmt=0, curRate=null;
  const rateAt=mi=>{ // mi=0始まりの月index。年目=floor(mi/12)+1
    const yn=Math.floor(mi/12)+1;
    let r=+loan.rate||0;
    if(+loan.rate2>0&&+loan.rate2From>0&&yn>=+loan.rate2From) r=+loan.rate2;
    if(+loan.rate3>0&&+loan.rate3From>0&&yn>=+loan.rate3From) r=+loan.rate3;
    return r;
  };
  const calcPmt=(b,r,rem)=>{ const i=r/100/12; return i===0?b/rem:b*i/(1-Math.pow(1+i,-rem)); };
  for(let mi=0;mi<n&&bal>0.0005;mi++){
    const year=loan.startYear+Math.floor(mi/12);
    // 年初の繰上返済
    if(usePrepay&&mi%12===0&&Array.isArray(loan.prepays)){
      loan.prepays.forEach(p=>{
        if(+p.year===year&&+p.amount>0&&bal>0.0005){
          const amt=Math.min(+p.amount,bal); bal-=amt;
          res.pay[year]=(res.pay[year]||0)+amt;
          if(p.type==="reduce"&&bal>0.0005) pmt=calcPmt(bal,rateAt(mi),n-mi); // 返済額軽減型
        }
      });
      if(bal<=0.0005){ res.payoffYear=year; res.balEnd[year]=0; break; }
    }
    const r=rateAt(mi);
    if(r!==curRate){ curRate=r; pmt=calcPmt(bal,r,n-mi); if(mi===0) res.initialMonthly=pmt; }
    const i=r/100/12;
    const int_=bal*i;
    const principal=Math.max(0,Math.min(pmt-int_,bal));
    bal-=principal;
    res.pay[year]=(res.pay[year]||0)+int_+principal;
    res.interest[year]=(res.interest[year]||0)+int_;
    res.totalInterest+=int_;
    res.balEnd[year]=bal;
    if(bal<=0.0005){ res.payoffYear=year; res.balEnd[year]=0; break; }
  }
  if(res.payoffYear==null) res.payoffYear=loan.startYear+loan.termYears-1;
  return res;
}
function loanAnnual(loan){ const s=loanSchedule(loan); return (s.initialMonthly||0)*12; }

/* ---------- 教育費：子の年齢→年額 ---------- */
function eduAt(edu, childAge){
  if(childAge>=edu.independentAge) return 0;
  for(const st of EDU_STAGES){
    if(childAge>=st.from && childAge<=st.to){
      const choice=edu.choices[st.label];
      return (choice && choice!=="なし") ? (EDU[choice]||0) : 0;
    }
  }
  return 0;
}

/* ---------- キャッシュフロー計算エンジン（現金と投資を分離） ---------- */
function computeCF(){
  ensurePlanModel();
  const prim = S.members.find(m=>m.role==="self") || S.members[0];
  // 世帯のCFは夫婦（本人・配偶者）の寿命まで。子の寿命では延長しない
  const adults = S.members.filter(m=>m.role==="self"||m.role==="spouse");
  const endYear = Math.max(...(adults.length?adults:S.members).map(m=>m.birthYear+m.lifespan));
  const loan=S.housing.loan;
  const sched=loanSchedule(loan);
  const infl=(+S.inflation||0)/100;
  const rows=[];
  // 資産の内部状態（現金プール＋投資は銘柄ごと）
  const cashAssets=S.assets.filter(a=>a.type!=="invest");
  const iv=S.assets.filter(a=>a.type==="invest").map(a=>({a,bal:+a.balance||0,depleteYear:null}));
  let cash=cashAssets.reduce((s,a)=>s+(+a.balance||0),0);
  const cashRate=(cashAssets.length?(+cashAssets[0].rate||0):0)/100;
  const startNet=cash+iv.reduce((s,x)=>s+x.bal,0);

  for(let year=S.baseYear; year<=endYear; year++){
    const primAge=ageInYear(prim,year);
    const ages={}; S.members.forEach(m=>{ ages[m.id]=ageInYear(m,year); });
    const f=Math.pow(1+infl, year-S.baseYear); // インフレ係数

    // ----- 収入 -----
    let salary=0,pension=0,retire=0,other=0, taxableEarned=0, taxablePension=0;
    S.incomes.forEach(inc=>{
      const m=member(inc.memberId); if(!m) return;
      const a=ages[inc.memberId];
      if(a>m.lifespan) return;
      if(inc.type==="salary"){ const v=salaryAt(inc,a); salary+=v; taxableEarned+=v; }
      else if(inc.type==="pension"){
        const ca=+inc.claimAge||inc.startAge||65;
        if(a>=ca){ const v=(+inc.annual||0)*pensionFactor(ca); pension+=v; taxablePension+=v; }
      }
      else if(inc.type==="retire"){ if(a===inc.age) retire+=inc.amount; }
      else if(inc.type==="other"){ if(a>=inc.startAge && a<=inc.endAge) other+=inc.annual; }
    });
    const incomeTotal=salary+pension+retire+other;

    // ----- 支出（生活費・教育費・イベントはインフレ反映。ローン・保険料は契約額のまま）-----
    let living=0;
    for(const seg of S.living){ if(primAge>=seg.from&&primAge<=seg.to){ living=seg.monthly*12*f; break; } }
    let housing=0;
    for(const r of S.housing.rent){ if(year>=r.fromYear&&year<=r.toYear) housing+=r.monthly*12; }
    housing+=sched.pay[year]||0;
    S.housing.maintenance.forEach(mt=>{
      if(primAge>=mt.fromAge&&primAge<=mt.toAge&&((primAge-mt.fromAge)%mt.cycle===0)) housing+=mt.annual*f;
    });
    // 住宅ローン控除（年末残高×控除率）
    let deduct=0;
    if(loan&&loan.on&&loan.deductOn&&year>=loan.startYear&&year<loan.startYear+loan.deductYears){
      const balY=sched.balEnd[year]!=null?sched.balEnd[year]:0;
      deduct=Math.min(loan.deductCap, balY*(loan.deductRate/100));
    }
    const cat={"車両費":0,"その他・将来の夢":0,"支払保険料":0,"教育・結婚資金":0};
    S.expenses.forEach(e=>{
      const t=member(e.targetId)||prim; const a=ages[t.id];
      if(a>=e.fromAge&&a<=e.toAge&&((a-e.fromAge)%e.cycle===0)){
        const v=e.category==="支払保険料"?e.amount:e.amount*f;
        cat[e.category]=(cat[e.category]||0)+v;
      }
    });
    let edu=0;
    S.educations.forEach(ed=>{ const c=member(ed.childId); if(!c) return; edu+=eduAt(ed, ages[ed.childId])*f; });
    cat["教育・結婚資金"]+=edu;
    // 電化製品の買い替え（購入年＋耐用年数ごとに同額を計上・インフレ反映）
    let appliance=0;
    (S.appliances||[]).forEach(ap=>{
      const by=+ap.boughtYear||0, ly=Math.max(1,+ap.lifeYears||10);
      if(by>0 && year>by && (year-by)%ly===0) appliance+=(+ap.price||0)*f;
    });
    const tax=taxOn(taxableEarned)+pensionTax(taxablePension);

    const expenseTotal = living+housing+cat["教育・結婚資金"]+cat["車両費"]+cat["その他・将来の夢"]+appliance+tax+cat["支払保険料"]-deduct;
    const balance = incomeTotal-expenseTotal;

    // ----- 資産（投資は銘柄ごとに月次で複利・積立・取り崩し）-----
    let contrib=0, withdraw=0;
    iv.forEach(x=>{
      const a=x.a, r=(+a.rate||0)/100/12;
      for(let m=0;m<12;m++){
        x.bal*=(1+r);
        if(+a.monthly>0 && primAge<=(+a.accumEndAge||120)){ x.bal+=+a.monthly; contrib+=+a.monthly; }
        if(+a.drawMonthly>0 && primAge>=(+a.drawStartAge||999) && x.bal>0){
          const w=Math.min(+a.drawMonthly,x.bal); x.bal-=w; withdraw+=w;
          if(x.bal<=0.0005 && x.depleteYear==null) x.depleteYear=year;
        }
      }
    });
    const cashGain=Math.max(cash,0)*cashRate;
    cash=cash+cashGain+balance-contrib+withdraw;
    // 現金が不足したら投資から追加で取り崩す
    if(cash<0){
      for(const x of iv){
        if(cash>=0) break;
        const take=Math.min(-cash,x.bal);
        if(take>0){ x.bal-=take; cash+=take; withdraw+=take; if(x.bal<=0.0005&&x.depleteYear==null) x.depleteYear=year; }
      }
    }
    const invest=iv.reduce((s,x)=>s+x.bal,0);
    const netWorth=cash+invest;

    rows.push({
      year, primAge, ages,
      salary,pension,retire,other,incomeTotal,
      living, housing, education:cat["教育・結婚資金"], car:cat["車両費"],
      other_exp:cat["その他・将来の夢"], appliance, tax, insurance:cat["支払保険料"], deduct,
      expenseTotal, balance, contrib, withdraw, cash, invest, netWorth
    });
  }
  const assetInfo=iv.map(x=>({id:x.a.id,name:x.a.name,depleteYear:x.depleteYear,finalBal:x.bal}));
  return {rows, startNet, prim, assetInfo, sched};
}

function wzSalaryCurve(nowAge,inc){ const a0=clamp(nowAge,22,64); if(a0>=54||inc<=0) return [{age:a0,annual:inc}]; return [{age:a0,annual:inc},{age:55,annual:Math.round(inc*1.15)}]; }

  if(eduRows.length){ const pe=eduRows.reduce((x,r)=>r.education>x.education?r:x); const bad=pe.cash<0||pe.netWorth<0; D.push({k:"教育費のピーク",lv:bad?"warn":"good",msg:`ピークは ${pe.year}年（本人${pe.primAge}歳・年 ${MAN(pe.education)}万円）。`,adv:bad?`この時期に資金が不足しがちです。学資保険や早めの積立で、支出の山をならしておきましょう。`:`ピーク時も資金は確保できる見込みです。`}); }

  let rank=pct>=0.85?"A":pct>=0.7?"B":pct>=0.5?"C":pct>=0.3?"D":"E";

  const comment={A:"とても健全なプランです。この調子で。",B:"おおむね良好です。いくつか整えるとより安心です。",C:"注意点がいくつかあります。下の改善ポイントを確認しましょう。",D:"見直しをおすすめします。改善ポイントから着手しましょう。",E:"早めの見直しが必要です。まずは支出と住居費から。"}[rank];
  const ic=lv=>lv==="good"?"◎":lv==="ok"?"○":"⚠";
  const items=D.map(d=>`<div class="diag-item"><div class="h"><span class="ic ${d.lv}">${ic(d.lv)}</span><span class="k">${d.k}</span></div><div class="msg">${d.msg}</div>${d.adv?`<div class="adv">💡 ${d.adv}</div>`:""}</div>`).join("");
  return `<div class="card">
    <div class="diag-badge"><div class="diag-rank ${rank}">${rank}</div><div><h2 style="margin:0">ライフプラン診断</h2><p class="hint" style="margin:2px 0 0">${comment}</p></div></div>
    ${items}
    <p class="mini" style="margin-top:10px">この診断はアプリ内の計算だけで自動判定した目安です（助言を保証するものではありません）。前提を変えると自動で再判定されます。設定が大変なときは <button class="wzskip" id="diagWizBtn" style="font-size:12px">🪄 かんたん設定ガイド</button> もどうぞ。</p>
  </div>`;
}

function memberSelect(sel){

function incomeCard(inc){
  const d=document.createElement("div"); d.className="itemrow"; d.style.display="block";
  const TL={salary:"給与",pension:"年金",retire:"退職金",other:"その他収入"};
  let body="";
  if(inc.type==="salary"){
    body=`<div class="mini" style="margin:6px 0 4px">年齢と年収(万円)の折れ線 ＋ 就業終了年齢</div><div id="pts_${inc.id}"></div>
      <button class="btn ghost sm" data-pt>+ 点を追加</button>
      <div style="margin-top:8px;max-width:160px"><label class="f">就業終了年齢</label><input type="number" data-k="endAge" value="${inc.endAge}"></div>`;
  } else if(inc.type==="pension"){
    const ca=+inc.claimAge||65, pf=pensionFactor(ca), adj=(+inc.annual||0)*pf;
    body=`<div class="seg"><div><label class="f">65歳基準の年額(万円)</label><input type="number" data-k="annual" value="${inc.annual}"></div>
      <div><label class="f">受給開始年齢(60〜75)</label><input type="number" data-k="claimAge" value="${ca}" min="60" max="75"></div></div>
      <p class="mini">ねんきん定期便の見込額（65歳時点・年額）を入力。繰上げは月-0.4%・繰下げは月+0.7%で自動調整 →
      <b>この設定では年${MAN(adj)}万円（${Math.round(pf*100)}%）</b>${ca!==65?`／${ca<65?"繰上げ":"繰下げ"}${Math.abs(ca-65)}年`:""}</p>`;
  } else if(inc.type==="retire"){
    body=`<div class="seg"><div><label class="f">受取年齢</label><input type="number" data-k="age" value="${inc.age}"></div>
      <div><label class="f">金額(万円)</label><input type="number" data-k="amount" value="${inc.amount}"></div></div>`;
  } else {
    body=`<div class="seg"><div><label class="f">年額(万円)</label><input type="number" data-k="annual" value="${inc.annual}"></div>
      <div><label class="f">開始年齢</label><input type="number" data-k="startAge" value="${inc.startAge}"></div>
      <div><label class="f">終了年齢</label><input type="number" data-k="endAge" value="${inc.endAge}"></div></div>`;
  }
  d.innerHTML=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:6px">
      <span class="tag">${TL[inc.type]}</span>
      <div style="flex:1;max-width:200px">${memberSelect(inc.memberId)}</div>
      <button class="btn danger sm">×</button></div>${body}`;
  d.querySelector("[data-k=memberId]").onchange=e=>{inc.memberId=e.target.value;commit();};
  d.querySelectorAll("[data-k]:not([data-k=memberId])").forEach(inp=>inp.onchange=e=>{inc[inp.dataset.k]=+e.target.value;commit();});
  d.querySelector(".danger").onclick=()=>{S.incomes=S.incomes.filter(x=>x!==inc);commit();};
  if(inc.type==="salary"){
    const pc=d.querySelector(`#pts_${inc.id}`);
    inc.points.forEach(pt=>{
      const r=document.createElement("div"); r.className="seg";
      r.innerHTML=`<span class="mini">年齢</span><input type="number" value="${pt.age}" data-p="age"><span class="mini">→ 年収</span><input type="number" value="${pt.annual}" data-p="annual"><button class="btn danger sm">×</button>`;
      r.querySelectorAll("[data-p]").forEach(inp=>inp.onchange=e=>{pt[inp.dataset.p]=+e.target.value;commit();});
      r.querySelector(".danger").onclick=()=>{inc.points=inc.points.filter(x=>x!==pt);commit();};
      pc.appendChild(r);
    });
    d.querySelector("[data-pt]").onclick=()=>{inc.points.push({age:40,annual:500});commit();};
  }
  return d;
}

function chartFrame(w,h){ return {w,h,pad:{l:52,r:14,t:14,b:34}}; }
function lineChart(rows){
  const f=chartFrame(Math.max(680,rows.length*9),260); const {w,h,pad}=f;
  const xs=rows.map(r=>r.primAge), ys=rows.map(r=>r.netWorth);
  const minY=Math.min(0,...ys), maxY=Math.max(...ys,1);
  const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  const X=a=>pad.l+ (a-xs[0])/(xs[xs.length-1]-xs[0])*iw;
  const Y=v=>pad.t+ (1-(v-minY)/(maxY-minY))*ih;
  const zeroY=Y(0);
  let path=rows.map((r,i)=>`${i?"L":"M"}${X(r.primAge).toFixed(1)},${Y(r.netWorth).toFixed(1)}`).join("");
  // grid + labels
  let grid="", ticks=4;
  for(let i=0;i<=ticks;i++){ const v=minY+(maxY-minY)*i/ticks; const y=Y(v);
    grid+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="var(--line)" stroke-width="1"/><text x="${pad.l-6}" y="${y+4}" text-anchor="end" font-size="11" fill="var(--sub)">${MAN(v)}</text>`;
  }
  let xlab="";
  for(let a=Math.ceil(xs[0]/10)*10; a<=xs[xs.length-1]; a+=10){ const x=X(a);
    xlab+=`<line x1="${x}" y1="${pad.t}" x2="${x}" y2="${h-pad.b}" stroke="var(--line)" stroke-width="1" opacity=".5"/><text x="${x}" y="${h-pad.b+16}" text-anchor="middle" font-size="11" fill="var(--sub)">${a}歳</text>`;
  }
  const neg=rows.find(r=>r.netWorth<0);
  let marker = neg?`<line x1="${X(neg.primAge)}" y1="${pad.t}" x2="${X(neg.primAge)}" y2="${h-pad.b}" stroke="var(--warn)" stroke-width="1.5" stroke-dasharray="4 3"/><text x="${X(neg.primAge)+4}" y="${pad.t+12}" font-size="11" fill="var(--warn)">${neg.primAge}歳で資産0</text>`:"";
  // 投資部分をエリア表示（現金との内訳が見える）
  let investArea="", legend="";
  if(rows[0]&&rows[0].invest!=null){
    const pts=rows.map(r=>`${X(r.primAge).toFixed(1)},${Y(Math.max(0,r.invest)).toFixed(1)}`).join(" ");
    investArea=`<polygon points="${X(rows[0].primAge).toFixed(1)},${zeroY.toFixed(1)} ${pts} ${X(rows[rows.length-1].primAge).toFixed(1)},${zeroY.toFixed(1)}" fill="var(--accent2)" opacity="0.25"/>`;
    legend=`<div class="legend"><span><i style="background:var(--accent)"></i>資産合計（現金＋投資）</span><span><i style="background:var(--accent2);opacity:.45"></i>うち投資</span></div>`;
  }
  return `<svg width="${w}" height="${h}" role="img" style="max-width:none">
    ${grid}${xlab}
    ${investArea}
    <line x1="${pad.l}" y1="${zeroY}" x2="${w-pad.r}" y2="${zeroY}" stroke="var(--sub)" stroke-width="1"/>
    <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2"/>
    ${marker}</svg>`+legend;
}
function balanceBars(rows){
  const step=Math.max(6,Math.floor(680/rows.length));
  const w=Math.max(680,rows.length*step), h=240, pad={l:52,r:14,t:14,b:30};
  const vals=rows.map(r=>r.balance);
  const maxV=Math.max(1,...vals.map(Math.abs));
  const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b, midY=pad.t+ih/2;
  const bw=Math.max(2,iw/rows.length-1);
  let bars=rows.map((r,i)=>{
    const x=pad.l+i*(iw/rows.length);
    const bh=Math.abs(r.balance)/maxV*(ih/2);
    const y=r.balance>=0?midY-bh:midY;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${r.balance>=0?"var(--pos)":"var(--neg)"}"/>`;
  }).join("");
  let grid=`<line x1="${pad.l}" y1="${midY}" x2="${w-pad.r}" y2="${midY}" stroke="var(--sub)"/>`;
  grid+=`<text x="${pad.l-6}" y="${midY+4}" text-anchor="end" font-size="11" fill="var(--sub)">0</text>`;
  grid+=`<text x="${pad.l-6}" y="${pad.t+10}" text-anchor="end" font-size="11" fill="var(--sub)">+${MAN(maxV)}</text>`;
  grid+=`<text x="${pad.l-6}" y="${h-pad.b}" text-anchor="end" font-size="11" fill="var(--sub)">-${MAN(maxV)}</text>`;
  let xlab="";
  for(let i=0;i<rows.length;i+=10){ const x=pad.l+i*(iw/rows.length); xlab+=`<text x="${x}" y="${h-6}" text-anchor="middle" font-size="11" fill="var(--sub)">${rows[i].primAge}歳</text>`; }
  return `<svg width="${w}" height="${h}" role="img" style="max-width:none">${grid}${bars}${xlab}</svg>`;
}
function stackedExpense(rows){
  const keys=[["living","#4fb39a"],["housing","#6ba0d8"],["education","#e0a13a"],["car","#c07f5c"],["appliance","#7fb069"],["other_exp","#9b8bd0"],["tax","#8a8a80"],["insurance","#d47ba0"]];
  const picked=rows.filter((r,i)=>i%5===0);
  const w=Math.max(680,picked.length*54+70), h=260, pad={l:52,r:14,t:14,b:34};
  const totals=picked.map(r=>keys.reduce((s,[k])=>s+Math.max(0,r[k]),0));
  const maxV=Math.max(1,...totals);
  const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  const bw=Math.min(40,iw/picked.length-8);
  let bars=picked.map((r,i)=>{
    const x=pad.l+i*(iw/picked.length)+ (iw/picked.length-bw)/2;
    let y=pad.t+ih, seg="";
    keys.forEach(([k,c])=>{ const v=Math.max(0,r[k]); const bh=v/maxV*ih; y-=bh;
      if(bh>0) seg+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${c}"/>`; });
    seg+=`<text x="${(x+bw/2).toFixed(1)}" y="${h-pad.b+16}" text-anchor="middle" font-size="10" fill="var(--sub)">${r.primAge}</text>`;
    return seg;
  }).join("");
  let grid="";
  for(let i=0;i<=4;i++){ const v=maxV*i/4, y=pad.t+ih-(v/maxV*ih);
    grid+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="var(--line)"/><text x="${pad.l-6}" y="${y+4}" text-anchor="end" font-size="11" fill="var(--sub)">${MAN(v)}</text>`; }
  return `<svg width="${w}" height="${h}" role="img" style="max-width:none">${grid}${bars}<text x="${pad.l}" y="${h-6}" font-size="11" fill="var(--sub)">（本人年齢・万円/年）</text></svg>`;
}

/* ========== 予実チェック ========== */
// ある年の「月次プラン（万円/月）」を経常項目とイベントに分けて返す
function monthlyPlan(year){
  const {rows,sched}=computeCF();
  const row=rows.find(r=>r.year===year);
  if(!row) return null;
  const loan=S.housing.loan;
  let rentLoan=0;
  for(const r of S.housing.rent){ if(year>=r.fromYear&&year<=r.toYear) rentLoan+=r.monthly*12; }
  rentLoan+=sched.pay[year]||0;
  const incomeNet=Math.max(0,row.incomeTotal-row.tax);
  return {
    row,
    recur:{
      income: incomeNet/12,
      living: row.living/12,
      housing: rentLoan/12,
      insurance: row.insurance/12,
      invest: row.contrib/12,
    },
    // イベント（年額）: 住宅維持・車・教育・その他（家電買替含む）
    events:{
      housing: row.housing - rentLoan,
      car: row.car,
      education: row.education,

  const best={a65:Math.max(...allM.map(m=>m.a65)),peak:Math.max(...allM.map(m=>m.peak)),final:Math.max(...allM.map(m=>m.final))};

    <div class="tblwrap"><table class="data"><thead><tr><th>プラン</th><th>65歳時点</th><th>ピーク資産</th><th>資産が尽きる</th><th>最終資産</th><th>現在との差</th><th></th></tr></thead><tbody>
      <tr><td>${dot("var(--accent)")}<b>${curName}</b><br><span class="mini">いま表示中の内容</span></td>
        ${money(mCur.a65,mCur.a65===best.a65)}${money(mCur.peak,mCur.peak===best.peak)}${negTd(mCur)}${money(mCur.final,mCur.final===best.final)}<td style="color:var(--sub)">—</td><td></td></tr>
      ${list.map(({sn,m,col})=>{
        const isActive=sn.id===S.activeScenarioId;
        return `<tr><td>${dot(col)}${esc(sn.name||"（無題）")}${isActive?' <span class="tag">使用中</span>':""}<br><span class="mini">${sn.savedAt?sn.savedAt.slice(0,10):""}</span></td>
          ${money(m.a65,m.a65===best.a65)}${money(m.peak,m.peak===best.peak)}${negTd(m)}${money(m.final,m.final===best.final)}${diffTd(m)}
          <td style="white-space:nowrap">${isActive?"":`<button class="btn sm" data-load="${sn.id}">切り替え</button> `}<button class="btn danger sm" data-delsn="${sn.id}">×</button></td></tr>`;

  document.getElementById("snapSave").onclick=()=>{

function scenarioChart(baseRows, others){
  const all=[baseRows,...others];
  const pad={l:52,r:14,t:14,b:30}, w=680, h=260, iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  const ages=baseRows.map(r=>r.primAge);
  const a0=ages[0], a1=ages[ages.length-1];
  let minY=0,maxY=1; all.forEach(rs=>rs.forEach(r=>{ minY=Math.min(minY,r.netWorth); maxY=Math.max(maxY,r.netWorth); }));
  const X=a=>pad.l+(a-a0)/(a1-a0||1)*iw, Y=v=>pad.t+(1-(v-minY)/(maxY-minY||1))*ih;
  const line=(rs,col)=>`<path d="${rs.map((r,i)=>`${i?"L":"M"}${X(r.primAge).toFixed(1)},${Y(r.netWorth).toFixed(1)}`).join("")}" fill="none" stroke="${col}" stroke-width="2"/>`;
  let grid="";
  for(let i=0;i<=4;i++){ const v=minY+(maxY-minY)*i/4, y=Y(v); grid+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="var(--line)"/><text x="${pad.l-6}" y="${y+4}" text-anchor="end" font-size="11" fill="var(--sub)">${MAN(v)}</text>`; }
  for(let a=Math.ceil(a0/10)*10;a<=a1;a+=10){ grid+=`<text x="${X(a)}" y="${h-pad.b+16}" text-anchor="middle" font-size="11" fill="var(--sub)">${a}歳</text>`; }
  const zeroY=Y(0);
  return `<svg width="${w}" height="${h}" role="img" style="max-width:none">${grid}<line x1="${pad.l}" y1="${zeroY}" x2="${w-pad.r}" y2="${zeroY}" stroke="var(--sub)"/>${others.map((rs,i)=>line(rs,catColor(i+1))).join("")}${line(baseRows,"var(--accent)")}</svg>`;
}

function renderTimeline(){
  const el=document.getElementById("anaBody");
  const {rows,prim,assetInfo}=computeCF();
  const evByYear={};
  const add=(year,txt)=>{ if(!year) return; (evByYear[year]=evByYear[year]||[]).push(txt); };
  // 教育イベント
  S.members.filter(m=>m.role==="child").forEach(c=>{
    const stages=[[6,"小学校入学"],[12,"中学校入学"],[15,"高校入学"],[18,"大学等"]];
    stages.forEach(([age,label])=>add(c.birthYear+age,`${c.name} ${label}`));
    const ed=S.educations.find(e=>e.childId===c.id);
    if(ed) add(c.birthYear+ (+ed.independentAge||22),`${c.name} 独立`);
  });
  // 就業終了・年金
  S.incomes.forEach(inc=>{ const m=member(inc.memberId); if(!m) return;
    if(inc.type==="salary"&&inc.endAge) add(m.birthYear+inc.endAge,`${m.name} 就業終了(${inc.endAge}歳)`);
    if(inc.type==="pension") add(m.birthYear+(+inc.claimAge||65),`${m.name} 年金受給開始`);
  });
  // ローン完済・繰上返済
  const sched=computeCF().sched;
  if(S.housing.loan&&S.housing.loan.on) add(sched.payoffYear,"住宅ローン完済");
  (S.housing.loan&&S.housing.loan.prepays||[]).forEach(p=>{ if(+p.amount>0) add(+p.year,`繰上返済 ${MAN(p.amount)}万`); });
  // 大きな支出イベント（車・その他の周期支出、住宅メンテ）
  S.expenses.forEach(e=>{ if(e.amount<50) return; const t=member(e.targetId)||prim;
    for(let a=e.fromAge;a<=e.toAge;a+=Math.max(1,e.cycle)){ add(t.birthYear+a,`${e.name} ${MAN(e.amount)}万`); }
  });
  S.housing.maintenance.forEach(mt=>{ if(mt.annual<50) return;
    for(let a=mt.fromAge;a<=mt.toAge;a+=Math.max(1,mt.cycle)){ add(prim.birthYear+a,`${mt.name} ${MAN(mt.annual)}万`); }
  });
  // 電化製品の買い替え（10万円以上のみ表示）
  const lastYear=rows.length?rows[rows.length-1].year:S.baseYear;
  (S.appliances||[]).forEach(ap=>{
    const by=+ap.boughtYear||0, ly=Math.max(1,+ap.lifeYears||10);
    if(!by||+ap.price<10) return;
    for(let y=by+ly;y<=lastYear;y+=ly){ if(y>=S.baseYear) add(y,`${ap.name}買替 ${MAN(ap.price)}万`); }
  });
  // 投資枯渇
  (assetInfo||[]).forEach(x=>{ if(x.depleteYear) add(x.depleteYear,`投資「${x.name}」枯渇`); });
  const years=Object.keys(evByYear).map(Number).filter(y=>y>=S.baseYear).sort((a,b)=>a-b);
  el.innerHTML=`
  <div class="card">
    <h2>ライフイベント年表</h2>
    <p class="hint">これから起きる主な出来事と、その年齢を一覧にしました。支出が重なる年が「注意すべき年」です。</p>
    ${years.length?`<div style="position:relative">${years.map(y=>{
      const r=rows.find(x=>x.year===y);
      const spend=r?r.expenseTotal:0;
      const heavy=r&&r.balance<0;
      return `<div class="tl-row${heavy?" heavy":""}">
        <div class="tl-year">${y}<br><span class="mini">${r?r.primAge+"歳":""}</span></div>
        <div class="tl-body">${evByYear[y].map(t=>`<span class="tl-ev">${t.replace(/</g,"&lt;")}</span>`).join("")}
          ${r?`<div class="mini" style="margin-top:3px">年間支出 ${MAN(spend)}万・収支 ${r.balance>=0?"+":""}${MAN(r.balance)}万${heavy?' <b style="color:var(--neg)">⚠赤字</b>':""}</div>`:""}
        </div></div>`;
    }).join("")}</div>`:`<p class="mini">表示できるイベントがありません。</p>`}
  </div>`;
}

/* ========== 家計簿（実績）データ ========== */
const EKEY="kakeibo_entries_v1", CKEY="kakeibo_config_v1";
// living=true のカテゴリがライフプランの「生活費」と対応する
const DEF_EXP=[["食費",1],["水道・光熱費",1],["家具・日用雑貨",1],["被服費",1],["医療費",1],["通信・交通費",1],["教養・娯楽費",1],["こづかい",1],["交際費",1],["その他雑費",1],["住宅",0],["車両",0],["教育",0],["保険",0],["投資・貯蓄",0],["特別支出",0]];
const INVEST_CAT="投資・貯蓄";
const DEF_INC=["給与","賞与","児童手当","その他"];
function ensureKakeibo(){
  if(!S.kakeibo||typeof S.kakeibo!=="object") S.kakeibo={};
  const k=S.kakeibo;
  if(!k.cats||typeof k.cats!=="object") k.cats={};
  if(!Array.isArray(k.cats.expense)||!k.cats.expense.length) k.cats.expense=DEF_EXP.map(([name,living])=>({name,living:!!living}));
  if(!Array.isArray(k.cats.income)||!k.cats.income.length) k.cats.income=DEF_INC.map(name=>({name}));
  if(!Array.isArray(k.fixed)) k.fixed=[];
  if(!k.budget||typeof k.budget!=="object") k.budget={monthly:0,scope:"living"};
  if(!k.budget.scope) k.budget.scope="living";
  if(!k.budget.perCat||typeof k.budget.perCat!=="object") k.budget.perCat={};
  // 「投資・貯蓄」カテゴリを既存ユーザーにも補完（特別支出の直前に）
  if(!k.cats.expense.some(c=>c.name===INVEST_CAT)){
    const i=k.cats.expense.findIndex(c=>c.name==="特別支出");
    const item={name:INVEST_CAT,living:false};
    if(i>=0) k.cats.expense.splice(i,0,item); else k.cats.expense.push(item);
  }
}
function expCats(){ return S.kakeibo.cats.expense.map(c=>c.name); }
function incCats(){ return S.kakeibo.cats.income.map(c=>c.name); }
function catsFor(kind){ return kind==="income"?incCats():expCats(); }
function livingSet(){ return new Set(S.kakeibo.cats.expense.filter(c=>c.living).map(c=>c.name)); }
let E=(function(){ try{const r=localStorage.getItem(EKEY); if(r) return JSON.parse(r);}catch(e){} return []; })();
let CFG=(function(){ try{const r=localStorage.getItem(CKEY); if(r) return JSON.parse(r);}catch(e){} return {url:"",anonKey:"",lastSyncAt:null}; })();
function saveEntries(){
  try{ localStorage.setItem(EKEY, JSON.stringify(E)); }
  catch(e){ if(storageOK){ storageOK=false; showStorageWarning(); } }
  scheduleSync();
}
function saveCfg(){ try{ localStorage.setItem(CKEY, JSON.stringify(CFG)); }catch(e){} }
const YEN=v=>Math.round(v).toLocaleString("ja-JP");
function newId(){ return (crypto.randomUUID)?crypto.randomUUID():uid()+"-"+Date.now().toString(36); }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function ymIndex(ym){ const [y,m]=ym.split("-").map(Number); return y*12+(m-1); }
function ymFromIndex(i){ return Math.floor(i/12)+"-"+String(i%12+1).padStart(2,"0"); }

/* ---------- 固定費・定期収入の自動計上 ---------- */
// idを「固定費ID+年月」から決定的に作るので、複数端末で生成しても重複しない
function applyFixed(){
  ensureKakeibo();
  const today=todayStr(), nowYM=today.slice(0,7);
  let added=false;
  S.kakeibo.fixed.forEach(f=>{
    if(!f.active||!f.startYM||!(f.amount>0)||!f.category) return;
    const every=Math.max(1,+f.everyMonths||1);
    const startI=ymIndex(f.startYM);
    let endI=ymIndex(nowYM);
    if(f.endYM && ymIndex(f.endYM)<endI) endI=ymIndex(f.endYM);
    for(let i=startI;i<=endI;i+=every){
      const ym=ymFromIndex(i);
      const [y,m]=ym.split("-").map(Number);
      const day=Math.min(Math.max(1,+f.day||1), daysInMonth(y,m));
      const date=ym+"-"+String(day).padStart(2,"0");
      if(date>today) continue; // 未来日はまだ計上しない
      const id="fx_"+f.id+"_"+ym;
      if(E.some(x=>x.id===id)) continue; // 生成済み（削除済みも含む＝復活させない）
      E.push({id,date,kind:f.kind,category:f.category,amount:Math.round(f.amount),memo:f.name,deleted:false,updated_at:new Date().toISOString(),dirty:true,fixedId:f.id});
      added=true;
    }
  });
  if(added) saveEntries();
  return added;
}

/* ---------- 家計簿タブ ---------- */
let kMonth=todayStr().slice(0,7), kKind="expense", kCat="", kSelDay=null;
function shiftMonth(d){ const [y,m]=kMonth.split("-").map(Number); const dt=new Date(y,m-1+d,1); kMonth=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0"); render(); }
function calendarHtml(list){
  const [y,m]=kMonth.split("-").map(Number);
  const lead=new Date(y,m-1,1).getDay(), dim=daysInMonth(y,m);
  const byDay={};
  list.forEach(x=>{ const d=+x.date.slice(8,10); if(!byDay[d]) byDay[d]={i:0,e:0};
    if(x.kind==="income") byDay[d].i+=x.amount; else byDay[d].e+=x.amount; });
  let cells="";
  for(let i=0;i<lead;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=dim;d++){
    const v=byDay[d]||{i:0,e:0};
    const date=kMonth+"-"+String(d).padStart(2,"0");
    const dow=new Date(y,m-1,d).getDay();
    cells+=`<div class="cal-cell${kSelDay===date?" sel":""}${date===todayStr()?" today":""}" data-day="${date}">
      <div class="cal-d${dow===0?" sun":dow===6?" sat":""}">${d}</div>
      ${v.e?`<div class="cal-e">-${YEN(v.e)}</div>`:""}
      ${v.i?`<div class="cal-i">+${YEN(v.i)}</div>`:""}</div>`;
  }
  return `<div class="cal">${["日","月","火","水","木","金","土"].map((w,i)=>`<div class="cal-h${i===0?" sun":i===6?" sat":""}">${w}</div>`).join("")}${cells}</div>
    <p class="mini" style="margin-top:8px">${kSelDay?`${+kSelDay.slice(8,10)}日を選択中（下の明細がその日だけになります）　<button class="btn ghost sm" id="calClear">選択解除</button>`:"日付をタップすると、その日の明細だけを表示します"}</p>`;
}
function entryRow(x){
  return `<div class="entry">
    <span class="mini">${+x.date.slice(8,10)}日</span>
    <span class="cat">${x.category}</span>
    <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(x.memo||"").replace(/</g,"&lt;")}${x.fixedId?' <span class="mini">(固定)</span>':""}</span>
    <span class="amt ${x.kind==="income"?"in":""}">${x.kind==="income"?"+":""}${YEN(x.amount)}円</span>
    <button class="btn danger sm" data-del="${x.id}">×</button>
  </div>`;
}
function bindDelete(el){
  el.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    const x=E.find(e=>e.id===b.dataset.del); if(!x) return;
    x.deleted=true; x.dirty=true; x.updated_at=new Date().toISOString();
    saveEntries(); render();
  });
}
function monthNavHtml(){
  const [yy,mm]=kMonth.split("-");
  return `<div class="monthnav" style="margin-bottom:0">
    <button class="btn ghost sm" id="mPrev">◀</button><b>${yy}年${+mm}月</b><button class="btn ghost sm" id="mNext">▶</button>
    <span class="mini" id="syncStatus" style="margin-left:auto">${window.__syncMsg||""}</span>
  </div>`;
}
function bindMonthNav(){
  document.getElementById("mPrev").onclick=()=>{kSelDay=null;shiftMonth(-1);};
  document.getElementById("mNext").onclick=()=>{kSelDay=null;shiftMonth(1);};
}

/* --- ホーム内: 収支（円グラフ） --- */
const CAT_COLORS=["#4fb39a","#6ba0d8","#e0a13a","#c07f5c","#9b8bd0","#d47ba0","#7fb069","#5bc0be","#e07a5f","#b56576","#8a8a80","#6d6875"];
function catColor(i){ return CAT_COLORS[i%CAT_COLORS.length]; }
function donutChart(items,total,label){
  const r=58, C=2*Math.PI*r;
  let off=0, segs="";
  if(total>0) items.forEach(it=>{
    const frac=it.value/total;
    segs+=`<circle cx="90" cy="90" r="${r}" fill="none" stroke="${it.color}" stroke-width="30" stroke-dasharray="${(frac*C).toFixed(2)} ${C.toFixed(2)}" stroke-dashoffset="${(-off*C).toFixed(2)}" transform="rotate(-90 90 90)"/>`;
    off+=frac;
  });
  return `<svg viewBox="0 0 180 180" width="180" height="180" role="img">
    ${segs||`<circle cx="90" cy="90" r="${r}" fill="none" stroke="var(--chip)" stroke-width="30"/>`}
    <text x="90" y="82" text-anchor="middle" font-size="12" fill="var(--sub)">${label}</text>
    <text x="90" y="102" text-anchor="middle" font-size="15" font-weight="600" fill="var(--ink)">${YEN(total)}円</text>
  </svg>`;
}

/* --- ホーム内: 推移（棒グラフ） --- */
function mondayOf(ds){ const d=new Date(ds+"T00:00:00"); const wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); return d; }
function fmtDate(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function trendBuckets(){
  const act=E.filter(x=>!x.deleted&&x.date);
  if(!act.length) return {buckets:[],note:""};
  let ranges=[];
  if(tMode==="week"){
    const mon=mondayOf(todayStr());
    for(let i=11;i>=0;i--){
      const s=new Date(mon); s.setDate(s.getDate()-7*i);
      const e2=new Date(s); e2.setDate(e2.getDate()+6);
      ranges.push({label:(s.getMonth()+1)+"/"+s.getDate(),from:fmtDate(s),to:fmtDate(e2)});
    }
  } else if(tMode==="month"){
    const base=ymIndex(todayStr().slice(0,7));
    for(let i=11;i>=0;i--){
      const ym=ymFromIndex(base-i);
      const [y,m]=ym.split("-").map(Number);
      ranges.push({label:String(y).slice(2)+"/"+m,from:ym+"-01",to:ym+"-"+String(daysInMonth(y,m)).padStart(2,"0")});
    }
  } else if(tMode==="year"){
    const years=act.map(x=>+x.date.slice(0,4));
    const y0=Math.min(...years), y1=Math.max(new Date().getFullYear(),Math.max(...years));
    for(let y=y0;y<=y1;y++) ranges.push({label:String(y),from:y+"-01-01",to:y+"-12-31"});
  } else {
    if(!tFrom||!tTo||tFrom>tTo) return {buckets:[],note:"開始日と終了日を指定してください"};
    const days=Math.round((new Date(tTo)-new Date(tFrom))/86400000)+1;
    if(days<=31){
      for(let i=0;i<days;i++){ const d=new Date(tFrom+"T00:00:00"); d.setDate(d.getDate()+i); const ds=fmtDate(d); ranges.push({label:(d.getMonth()+1)+"/"+d.getDate(),from:ds,to:ds}); }
    } else if(days<=190){
      let s=mondayOf(tFrom);
      while(fmtDate(s)<=tTo){ const e2=new Date(s); e2.setDate(e2.getDate()+6); ranges.push({label:(s.getMonth()+1)+"/"+s.getDate(),from:fmtDate(s),to:fmtDate(e2)}); s=new Date(s); s.setDate(s.getDate()+7); }
    } else {
      let i=ymIndex(tFrom.slice(0,7)); const end=ymIndex(tTo.slice(0,7));
      for(;i<=end;i++){ const ym=ymFromIndex(i); const [y,m]=ym.split("-").map(Number); ranges.push({label:String(y).slice(2)+"/"+m,from:ym+"-01",to:ym+"-"+String(daysInMonth(y,m)).padStart(2,"0")}); }
    }
  }
  const val=(from,to)=>{
    const inR=act.filter(x=>x.date>=from&&x.date<=to);
    if(tMetric==="expense") return inR.filter(x=>x.kind==="expense").reduce((s,x)=>s+x.amount,0);
    if(tMetric==="income") return inR.filter(x=>x.kind==="income").reduce((s,x)=>s+x.amount,0);
    if(tMetric==="balance") return inR.reduce((s,x)=>s+(x.kind==="income"?x.amount:-x.amount),0);
    if(tMetric.indexOf("cat:")===0){
      const p=tMetric.split(":");
      return inR.filter(x=>x.kind===(p[1]==="e"?"expense":"income")&&x.category===p[2]).reduce((s,x)=>s+x.amount,0);
    }
    return 0;
  };
  let buckets;
  if(tMetric==="savings"){
    buckets=ranges.map(r=>({label:r.label,value:act.filter(x=>x.date<=r.to).reduce((s,x)=>s+(x.kind==="income"?x.amount:-x.amount),0)}));
  } else buckets=ranges.map(r=>({label:r.label,value:val(r.from,r.to)}));
  return {buckets,note:""};
}
function trendBarChart(buckets){
  if(!buckets.length) return "";
  const n=buckets.length;
  const bw=Math.max(26,Math.min(56,Math.floor(600/n)));
  const gap=10, padL=64, padR=10, padT=18, padB=40;
  const w=padL+n*(bw+gap)+padR, h=280, ih=h-padT-padB;
  const maxV=Math.max(1,...buckets.map(b=>Math.abs(b.value)));
  const hasNeg=buckets.some(b=>b.value<0);
  const zeroY=hasNeg?padT+ih/2:padT+ih;
  const scale=(hasNeg?ih/2:ih)/maxV;
  const isExpMetric=tMetric==="expense"||tMetric.indexOf("cat:e")===0;
  const isIncMetric=tMetric==="income"||tMetric.indexOf("cat:i")===0;
  const colorFor=v=> isExpMetric?"#6ba0d8" : isIncMetric?"var(--pos)" : (v>=0?"var(--pos)":"var(--neg)");
  const fmt=v=>{ const a=Math.abs(v); return a>=100000000?(v/100000000).toFixed(1)+"億" : a>=10000?Math.round(v/10000).toLocaleString("ja-JP")+"万" : v.toLocaleString("ja-JP"); };
  let bars="", labels="";
  buckets.forEach((b,i)=>{
    const x=padL+i*(bw+gap);
    const bh=Math.abs(b.value)*scale;
    const y=b.value>=0?zeroY-bh:zeroY;
    if(b.value!==0){
      bars+=`<rect x="${x}" y="${y.toFixed(1)}" width="${bw}" height="${Math.max(1,bh).toFixed(1)}" rx="3" fill="${colorFor(b.value)}"/>`;
      bars+=`<text x="${x+bw/2}" y="${(b.value>=0?y-5:y+bh+13).toFixed(1)}" text-anchor="middle" font-size="10" fill="var(--sub)">${fmt(b.value)}</text>`;
    }
    labels+=`<text x="${x+bw/2}" y="${h-padB+16}" text-anchor="middle" font-size="11" fill="var(--sub)">${b.label}</text>`;
  });
  let grid=`<line x1="${padL-6}" y1="${zeroY}" x2="${w-padR}" y2="${zeroY}" stroke="var(--sub)" stroke-width="1"/>`;
  grid+=`<text x="${padL-10}" y="${zeroY+4}" text-anchor="end" font-size="10" fill="var(--sub)">0</text>`;
  grid+=`<line x1="${padL-6}" y1="${padT}" x2="${w-padR}" y2="${padT}" stroke="var(--line)"/>`;
  grid+=`<text x="${padL-10}" y="${padT+4}" text-anchor="end" font-size="10" fill="var(--sub)">${fmt(maxV)}</text>`;
  if(hasNeg){ grid+=`<line x1="${padL-6}" y1="${padT+ih}" x2="${w-padR}" y2="${padT+ih}" stroke="var(--line)"/><text x="${padL-10}" y="${padT+ih+4}" text-anchor="end" font-size="10" fill="var(--sub)">-${fmt(maxV)}</text>`; }
  return `<div class="chartbox"><svg width="${w}" height="${h}" style="max-width:none" role="img">${grid}${bars}${labels}</svg></div>`;
}

/* ---------- 支出目標・貯蓄達成率 ---------- */
// ライフプランの生活費（その年の本人年齢に対応する月額・円）
function planLivingMonthly(year){
  const prim=S.members.find(m=>m.role==="self")||S.members[0];
  if(!prim) return 0;
  const age=year-prim.birthYear;
  const seg=S.living.find(s=>age>=s.from&&age<=s.to);
  return seg&&seg.monthly?seg.monthly*10000:0;
}
function budgetCard(list){
  ensureKakeibo();
  const b=S.kakeibo.budget;
  const year=+kMonth.slice(0,4);
  const planLiv=planLivingMonthly(year);
  const per=S.kakeibo.cats.expense.map(c=>c.name).filter(n=>+(b.perCat[n]||0)>0);
  let target, actual, srcNote;
  if(per.length){
    // カテゴリ別目標の合計を全体目標にする
    target=per.reduce((s,n)=>s+ +b.perCat[n],0);
    const names=new Set(per);
    actual=list.filter(x=>x.kind==="expense"&&names.has(x.category)).reduce((s,x)=>s+x.amount,0);
    srcNote=`目標: ${per.length}カテゴリの設定額合計`;
  }else{
    // 目標未設定時はライフプランの生活費を自動目標に
    target=planLiv;
    if(!(target>0)) return "";
    const LS=livingSet();
    actual=list.filter(x=>x.kind==="expense"&&LS.has(x.category)).reduce((s,x)=>s+x.amount,0);
    srcNote="目標未設定のため、ライフプランの生活費（生活費カテゴリが対象）を自動で使用";
  }
  const pct=Math.round(actual/target*100);
  const over=actual>target;
  const color=over?"var(--neg)":(pct>=80?"#BA7517":"var(--pos)");
  return `<div class="card"><h2>今月の支出目標</h2>
    <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
      <b style="font-size:28px;color:${color}">${pct}%</b>
      <span class="mini">${YEN(actual)}円 / 目標 ${YEN(target)}円</span>
    </div>
    <div class="pbar"><div style="width:${Math.min(100,pct)}%;background:${color}"></div></div>
    <p class="mini" style="margin-top:6px">
      ${over?`目標を <b style="color:var(--neg)">${YEN(actual-target)}円</b> 超えています`:`残り <b>${YEN(target-actual)}円</b>`}
      　|　${srcNote}
    </p>
    ${planLiv>0?`<p class="mini" style="margin-top:4px;color:var(--sub)">参考: ライフプランの生活費は月 ${YEN(planLiv)}円。実績が毎月これを超えるようなら、「前提の入力＞支出」の生活費を実態に合わせるとキャッシュフロー予測が現実に近づきます。</p>`:""}
  </div>`;
}
// ライフプランが想定する「その年に貯めるべき額」に対する達成率
function savingsCard(list){
  const year=+kMonth.slice(0,4);
  let rows; try{ rows=computeCF().rows; }catch(e){ return ""; }
  const row=rows.find(r=>r.year===year);
  if(!row) return "";
  const inc=list.filter(x=>x.kind==="income").reduce((s,x)=>s+x.amount,0);
  const exp=list.filter(x=>x.kind==="expense").reduce((s,x)=>s+x.amount,0);
  const actual=inc-exp;
  const targetMonth=row.balance*10000/12;
  if(!(targetMonth>0)){
    return `<div class="card"><h2>貯蓄の達成率</h2>
      <p class="mini">ライフプラン上、${year}年は年間 ${MAN(row.balance)}万円の想定（貯蓄目標なし）です。今月の収支は <b>${YEN(actual)}円</b>。</p></div>`;
  }
  const pct=Math.round(actual/targetMonth*100);
  const ok=actual>=targetMonth;
  const color=ok?"var(--pos)":(pct>=60?"#BA7517":"var(--neg)");
  return `<div class="card"><h2>貯蓄の達成率</h2>
    <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
      <b style="font-size:28px;color:${color}">${pct}%</b>
      <span class="mini">今月の貯蓄 ${YEN(actual)}円 / 目標 ${YEN(targetMonth)}円</span>
    </div>
    <div class="pbar"><div style="width:${Math.min(100,Math.max(0,pct))}%;background:${color}"></div></div>
    <p class="mini" style="margin-top:6px">ライフプランでは${year}年に年間 <b>${MAN(row.balance)}万円</b>（月あたり ${YEN(targetMonth)}円）貯める想定です。${ok?"順調です。":`このペースが続くと、${year}年の貯蓄が計画に届きません。`}</p>
  </div>`;
}

];
let RULES=(function(){ try{const r=localStorage.getItem(RKEY); if(r) return JSON.parse(r);}catch(e){} return []; })();
function saveRules(){ try{ localStorage.setItem(RKEY, JSON.stringify(RULES)); }catch(e){} }
function guessCategory(memo,kind){
  const M=(memo||"").toUpperCase();
  const cats=catsFor(kind);
  for(const r of RULES) if(r.kw && cats.includes(r.c) && M.includes(r.kw.toUpperCase())) return r.c;
  for(const r of DEFAULT_RULES) if(cats.includes(r.c) && M.includes(r.kw.toUpperCase())) return r.c;
  return kind==="income"?"その他":"その他雑費";
}
function parseCSV(text){
  const rows=[]; let row=[], cell="", q=false;
  for(let i=0;i<text.length;i++){ const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else q=false; } else cell+=ch; }
    else if(ch==='"') q=true;
    else if(ch===","){ row.push(cell); cell=""; }
    else if(ch==="\n"||ch==="\r"){ if(ch==="\r"&&text[i+1]==="\n") i++; row.push(cell); cell=""; if(row.some(c=>c!=="")) rows.push(row); row=[]; }
    else cell+=ch;
  }
  row.push(cell); if(row.some(c=>c!=="")) rows.push(row);
  return rows;
}
function parseDateCell(s){
  if(s==null) return null;
  s=String(s).trim().replace(/[年月]/g,"/").replace(/日/g,"");
  const m=s.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/);
  if(!m) return null;
  const mo=+m[2], d=+m[3];
  if(mo<1||mo>12||d<1||d>31) return null;
  return m[1]+"-"+String(mo).padStart(2,"0")+"-"+String(d).padStart(2,"0");
}
function parseAmount(s){
  if(s==null) return null;
  const t=String(s).replace(/[¥\\,\s"円]/g,"");
  if(t===""||isNaN(+t)) return null;
  return +t;
}
let kImportRows=null, kImportName="";
function buildImportRows(rows){
  if(!rows||!rows.length) return [];
  const KW_DATE=/日付|利用日|取引日|年月日|ご利用日|お取引日/;
  const KW_PAY=/出金|利用金額|支払金額|支払額|引落|お引出し|金額/;
  const KW_IN=/入金|預入|お預入/;
  const KW_MEMO=/店名|摘要|内容|備考|名称|利用店|お取り扱い/;
  let hi=-1;
  for(let i=0;i<Math.min(rows.length,10);i++) if(rows[i].some(c=>KW_DATE.test(c||""))){ hi=i; break; }
  let dateCol=-1,payCol=-1,inCol=-1,memoCol=-1;
  if(hi>=0){
    rows[hi].forEach((c,j)=>{ c=c||"";
      if(dateCol<0&&KW_DATE.test(c)) dateCol=j;
      if(inCol<0&&KW_IN.test(c)) inCol=j;
      if(memoCol<0&&KW_MEMO.test(c)) memoCol=j;
    });
    rows[hi].forEach((c,j)=>{ c=c||""; if(payCol<0&&j!==inCol&&KW_PAY.test(c)) payCol=j; });
  }
  const data=rows.slice(hi+1);
  const sample=data.slice(0,30);
  const width=Math.max(0,...sample.map(r=>r.length));
  if(dateCol<0){ let best=-1,bc=0; for(let j=0;j<width;j++){ const c=sample.filter(r=>parseDateCell(r[j])).length; if(c>bc){bc=c;best=j;} } dateCol=best; }
  if(dateCol<0) return [];
  // 見出しから選んだ金額列が実際には数値でない場合は選び直す（「支払方法」等の誤検出対策）
  const numRate=j=>{ if(j<0) return 0; const n=sample.filter(r=>{const v=parseAmount(r[j]);return v!==null&&v!==0;}).length; return sample.length?n/sample.length:0; };
  if(payCol>=0 && numRate(payCol)===0) payCol=-1;
  if(inCol>=0 && numRate(inCol)===0) inCol=-1;
  if(payCol<0){ let best=-1,bc=0;
    for(let j=0;j<width;j++){ if(j===dateCol) continue;
      const c=sample.filter(r=>{const v=parseAmount(r[j]);return v!==null&&v!==0;}).length;
      if(c>=bc&&c>0){bc=c;best=j;} }
    payCol=best;
  }
  if(payCol<0) return [];
  if(memoCol<0){ let best=-1,bl=0;
    for(let j=0;j<width;j++){ if(j===dateCol||j===payCol||j===inCol) continue;
      const l=sample.reduce((s,r)=>s+String(r[j]||"").replace(/[\d,.\-\/]/g,"").length,0);
      if(l>bl){bl=l;best=j;} }
    memoCol=best;
  }
  const out=[];
  data.forEach(r=>{
    const date=parseDateCell(r[dateCol]); if(!date) return;
    let amount=null, kind="expense";
    const inV=inCol>=0?parseAmount(r[inCol]):null;
    const payV=parseAmount(r[payCol]);
    if(inV){ amount=inV; kind="income"; }
    else if(payV){ amount=payV; kind="expense"; }
    if(amount==null||amount===0) return;
    if(amount<0){ amount=-amount; kind=(kind==="expense")?"income":"expense"; }
    amount=Math.round(amount);
    const memo=String(memoCol>=0?(r[memoCol]||""):"").trim();
    const dup=E.some(x=>!x.deleted&&x.date===date&&x.amount===amount&&(x.memo||"")===memo);
    const category=guessCategory(memo,kind);
    out.push({date,memo,amount,kind,category,guess:category,dup,include:!dup});
  });
  return out;
}

function attachCsvHandlers(el){
  const f=el.querySelector("#csvFile");
  if(f) f.onchange=async e=>{
    const file=e.target.files[0]; if(!file) return;
    try{
      const buf=await file.arrayBuffer();
      let text;
      try{ text=new TextDecoder("utf-8",{fatal:true}).decode(buf); }
      catch(err){ text=new TextDecoder("shift_jis").decode(buf); }
      kImportRows=buildImportRows(parseCSV(text));
      kImportName=file.name;
      if(!kImportRows.length){ kImportRows=null; alert("明細行を検出できませんでした。CSVの1〜10行目に「日付」「金額」などの見出し行があるかご確認ください。"); }

    }catch(err){ alert("読み込みエラー: "+(err.message||err)); }
  };
  const all=el.querySelector("#csvAll"); if(all) all.onclick=()=>{ kImportRows.forEach(r=>r.include=true); render(); };
  const none=el.querySelector("#csvNone"); if(none) none.onclick=()=>{ kImportRows.forEach(r=>r.include=false); render(); };
  el.querySelectorAll("[data-ck]").forEach(c=>c.onchange=()=>{
    kImportRows[+c.dataset.ck].include=c.checked;
    const go=el.querySelector("#csvGo"); if(go) go.textContent=`選択した${kImportRows.filter(r=>r.include).length}件を取り込む`;
  });
  el.querySelectorAll("[data-cat]").forEach(s=>s.onchange=()=>{ kImportRows[+s.dataset.cat].category=s.value; });
  const go=el.querySelector("#csvGo");
  if(go) go.onclick=()=>{
    const sel=kImportRows.filter(r=>r.include);
    const now=new Date().toISOString();
    sel.forEach(r=>{
      if(r.category!==r.guess && r.memo){
        RULES=RULES.filter(x=>x.kw!==r.memo);
        RULES.unshift({kw:r.memo,c:r.category});
      }
      E.push({id:newId(),date:r.date,kind:r.kind,category:r.category,amount:r.amount,memo:r.memo,deleted:false,updated_at:now,dirty:true});
    });
    if(RULES.length>500) RULES=RULES.slice(0,500);
    saveRules(); saveEntries();
    if(sel.length) kMonth=sel[0].date.slice(0,7);
    kImportRows=null; render();
    alert(sel.length+"件を取り込みました");
  };
  const cancel=el.querySelector("#csvCancel");
  if(cancel) cancel.onclick=()=>{ kImportRows=null; render(); };
}

/* ---------- 同期エンジン ---------- */
let sbClient=null, syncTimer=null, syncing=false;
function setSyncStatus(t){ window.__syncMsg=t; document.querySelectorAll("#syncStatus").forEach(el=>el.textContent=t); }
function loadScriptOnce(src){ return new Promise((res,rej)=>{
  if(document.querySelector(`script[src="${src}"]`)&&window.supabase) return res();
  const s=document.createElement("script"); s.src=src; s.onload=res; s.onerror=()=>rej(new Error("supabase-jsの読み込みに失敗（オフライン？）")); document.head.appendChild(s);
});}
async function getClient(){
  if(!CFG.url||!CFG.anonKey) return null;
  if(!sbClient){
    await loadScriptOnce("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js");
    sbClient=window.supabase.createClient(CFG.url,CFG.anonKey);
  }
  return sbClient;
}
async function currentUser(){ const c=await getClient(); if(!c) return null; const {data}=await c.auth.getSession(); return data.session?data.session.user:null; }
function scheduleSync(){ if(!CFG.url||!CFG.anonKey) return; clearTimeout(syncTimer); syncTimer=setTimeout(()=>syncNow(true),4000); }
async function syncNow(silent){
  if(syncing) return;
  syncing=true;
  let pulled=false;
  try{
    const c=await getClient(); if(!c){ if(!silent) setSyncStatus("Supabase未設定です"); return; }
    const user=await currentUser(); if(!user){ if(!silent) setSyncStatus("未ログインのため同期できません（設定タブでログイン）"); return; }
    setSyncStatus("同期中…");
    // 1) 未送信の明細をpush
    const dirty=E.filter(x=>x.dirty);
    if(dirty.length){
      const payload=dirty.map(x=>({id:x.id,user_id:user.id,date:x.date,kind:x.kind,category:x.category,amount:x.amount,memo:x.memo||"",deleted:!!x.deleted,updated_at:x.updated_at}));
      const {error}=await c.from("entries").upsert(payload); if(error) throw error;
      dirty.forEach(x=>x.dirty=false);
    }
    // 2) 他端末の明細をpull（前回同期以降の更新分）
    let q=c.from("entries").select("*");
    if(CFG.lastSyncAt) q=q.gt("updated_at",CFG.lastSyncAt);
    const {data:remote,error:e2}=await q; if(e2) throw e2;
    (remote||[]).forEach(r=>{
      const loc=E.find(x=>x.id===r.id);
      if(!loc){ E.push({id:r.id,date:r.date,kind:r.kind,category:r.category,amount:r.amount,memo:r.memo||"",deleted:!!r.deleted,updated_at:r.updated_at,dirty:false}); pulled=true; }
      else if(!loc.dirty && (r.updated_at||"")>(loc.updated_at||"")){ Object.assign(loc,{date:r.date,kind:r.kind,category:r.category,amount:r.amount,memo:r.memo||"",deleted:!!r.deleted,updated_at:r.updated_at}); pulled=true; }
    });
    // 3) ライフプラン前提の同期（新しい方を採用）
    const {data:planRow,error:e3}=await c.from("plans").select("data,updated_at").eq("user_id",user.id).maybeSingle(); if(e3) throw e3;
    const localT=S._updatedAt||"";
    if(!planRow || (localT && localT>planRow.updated_at)){
      const {error:e4}=await c.from("plans").upsert({user_id:user.id,data:S,updated_at:localT||new Date().toISOString()}); if(e4) throw e4;
    } else if(planRow && planRow.updated_at>(localT||"")){
      S=planRow.data; S._updatedAt=planRow.updated_at; ensureKakeibo(); save(); applyFixed(); pulled=true;
    }
    CFG.lastSyncAt=new Date().toISOString(); saveCfg();
    try{ localStorage.setItem(EKEY,JSON.stringify(E)); }catch(e){}
    setSyncStatus("同期完了 "+new Date().toLocaleTimeString("ja-JP"));
    if(pulled) render();
  }catch(err){ setSyncStatus("同期エラー: "+(err.message||err)); }
  finally{ syncing=false; }
}

document.getElementById("modeP").onclick=()=>{ MODE="lifeplan"; settingsOpen=false; render(); };
document.getElementById("gearBtn").onclick=()=>{ settingsOpen=!settingsOpen; render(); };

ensureKakeibo();   // 既存ユーザーのデータに家計簿設定を補完
ensurePlanModel(); // 資産・年金・ローンの新項目を補完（旧データ移行）
applyFixed();      // 起動時に、当月ぶんまでの固定費を計上
render();
// 初回起動（まっさらな新規ユーザー）だけ、設定ガイドを自動で案内
const WZKEY="kakeibo_wizard_v1";
function wizardSeen(){ try{ return !!localStorage.getItem(WZKEY); }catch(e){ return true; } }
function markWizardSeen(){ try{ localStorage.setItem(WZKEY,"1"); }catch(e){} }
if(!wizardSeen()){
  markWizardSeen();
  if(!S._updatedAt && (!E || !E.length)){ MODE="lifeplan"; settingsOpen=false; pCur="home"; render(); wzOpen(); }
}
// PWA（https配信時のみ有効。file://では静かにスキップ）
function showUpdateBar(){
  if(document.getElementById("updBar")) return;
  const bar=document.createElement("div");
  bar.id="updBar";
  bar.style.cssText="background:var(--accent);color:#fff;padding:9px 16px;font-size:13px;text-align:center;cursor:pointer";
  bar.innerHTML='新しいバージョンがあります。<b style="text-decoration:underline">ここをタップして更新</b>';
  bar.onclick=()=>location.reload();
  document.body.insertBefore(bar, document.body.firstChild);
}
if("serviceWorker" in navigator && /^https?:$/.test(location.protocol)){
  navigator.serviceWorker.register("./sw.js",{updateViaCache:"none"}).then(reg=>{
    reg.addEventListener("updatefound",()=>{
      const nw=reg.installing; if(!nw) return;
      nw.addEventListener("statechange",()=>{
        // 既に別のSWが動いている＝更新版が入った、初回インストールではない
        if(nw.state==="installed" && navigator.serviceWorker.controller) showUpdateBar();
      });
    });
    reg.update().catch(()=>{});
    setInterval(()=>reg.update().catch(()=>{}), 60*60*1000);
  }).catch(()=>{});
}
// 起動時に一度同期（Supabase設定済み・ログイン済みの場合のみ動く）
if(CFG.url && CFG.anonKey && navigator.onLine) syncNow(true);
</script>
